<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse des données LMS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .stat-badge {
            background: #34495e;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .chart-wrapper {
            position: relative;
            height: 500px;
            width: 100%;
        }

        label {
            font-weight: bold;
            color: #555;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>Analyse des données LMS</h1>
            <div class="stat-badge" id="totalBadge">Total sur la période : 0</div>
        </div>

        <div class="filter-bar">
            <div>
                <label for="viewType">Type de vue :</label>
                <select id="viewType">
                    <option value="actifs">📈 Apprenants Actifs (Quotidien)</option>
                    <option value="ressources" selected>🔗 Connexions Ressources (Quotidien)</option>
                    <option value="moyenne_hebdo">📊 Moyenne Hebdomadaire (Période)</option>
                    <option value="location">📍 Répartition par Ville (Top 20)</option>
                </select>
            </div>
            <div id="dateFilters">
                <label>Période :</label>
                <input type="date" id="startDate" value="2026-01-01">
                <input type="date" id="endDate" value="2026-02-27">
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

            ressources: [{ "date": "2026-02-27", "val": "302" }, { "date": "2026-02-26", "val": "9567" }, { "date": "2026-02-25", "val": "9169" }, { "date": "2026-02-24", "val": "11847" }, { "date": "2026-02-23", "val": "8679" }, { "date": "2026-02-22", "val": "1838" }, { "date": "2026-02-21", "val": "1431" }, { "date": "2026-02-20", "val": "3844" }, { "date": "2026-02-19", "val": "8542" }, { "date": "2026-02-18", "val": "7666" }, { "date": "2026-02-17", "val": "6168" }, { "date": "2026-02-16", "val": "8023" }, { "date": "2026-02-15", "val": "1773" }, { "date": "2026-02-14", "val": "1246" }, { "date": "2026-02-13", "val": "3766" }, { "date": "2026-02-12", "val": "6831" }, { "date": "2026-02-11", "val": "6189" }, { "date": "2026-02-10", "val": "8086" }, { "date": "2026-02-09", "val": "8959" }, { "date": "2026-02-08", "val": "1494" }, { "date": "2026-02-07", "val": "1386" }, { "date": "2026-02-06", "val": "3206" }, { "date": "2026-02-05", "val": "5664" }, { "date": "2026-02-04", "val": "6586" }, { "date": "2026-02-03", "val": "5062" }, { "date": "2026-02-02", "val": "5327" }, { "date": "2026-02-01", "val": "1806" }, { "date": "2026-01-31", "val": "1212" }, { "date": "2026-01-30", "val": "3726" }, { "date": "2026-01-29", "val": "6181" }, { "date": "2026-01-28", "val": "5619" }, { "date": "2026-01-27", "val": "5011" }, { "date": "2026-01-26", "val": "5012" }, { "date": "2026-01-25", "val": "1022" }, { "date": "2026-01-24", "val": "1411" }, { "date": "2026-01-23", "val": "7700" }, { "date": "2026-01-22", "val": "18691" }, { "date": "2026-01-21", "val": "9672" }, { "date": "2026-01-20", "val": "5795" }, { "date": "2026-01-19", "val": "6552" }, { "date": "2026-01-18", "val": "1927" }, { "date": "2026-01-17", "val": "862" }, { "date": "2026-01-16", "val": "3475" }, { "date": "2026-01-15", "val": "5427" }, { "date": "2026-01-14", "val": "5714" }, { "date": "2026-01-13", "val": "5131" }, { "date": "2026-01-12", "val": "7255" }, { "date": "2026-01-11", "val": "1779" }, { "date": "2026-01-10", "val": "1099" }, { "date": "2026-01-09", "val": "3189" }, { "date": "2026-01-08", "val": "4353" }, { "date": "2026-01-07", "val": "5438" }, { "date": "2026-01-06", "val": "3820" }, { "date": "2026-01-05", "val": "4483" }, { "date": "2026-01-04", "val": "1314" }, { "date": "2026-01-03", "val": "1309" }, { "date": "2026-01-02", "val": "1748" }, { "date": "2026-01-01", "val": "1034" }].reverse()
        };

        const dataLocation = [{ "Location": "BORDEAUX", "val": 524 }, { "Location": "TOULOUSE", "val": 447 }, { "Location": "CENTRE DIGITAL", "val": 421 }, { "Location": "NANTES", "val": 395 }, { "Location": "MARSEILLE", "val": 386 }, { "Location": "SAINT QUENTIN FALLAVIER", "val": 329 }, { "Location": "RENNES", "val": 325 }, { "Location": "NANCY", "val": 311 }, { "Location": "SAVIGNY LE TEMPLE", "val": 268 }, { "Location": "CAEN", "val": 257 }, { "Location": "MONCHY", "val": 251 }, { "Location": "ORLEANS", "val": 250 }, { "Location": "NIORT", "val": 239 }, { "Location": "AMIENS", "val": 225 }, { "Location": "DIJON", "val": 223 }, { "Location": "AUXERRE", "val": 212 }, { "Location": "PERPIGNAN", "val": 212 }, { "Location": "BESANCON", "val": 211 }, { "Location": "NICE", "val": 211 }, { "Location": "TOURS", "val": 210 }];

        let myChart = null;
        const ctx = document.getElementById('mainChart').getContext('2d');

        function calculateWeeklyFromFiltered(filteredData) {
            const weeks = {};
            filteredData.forEach(item => {
                const d = new Date(item.date);
                const year = d.getFullYear();

                // Calcul du numéro de semaine ISO
                const tempDate = new Date(d.valueOf());
                tempDate.setDate(tempDate.getDate() + 4 - (tempDate.getDay() || 7));
                const yearStart = new Date(tempDate.getFullYear(), 0, 1);
                const weekNum = Math.ceil((((tempDate - yearStart) / 86400000) + 1) / 7);

                // Label incluant l'année pour éviter les doublons 2025/2026
                const label = `S${weekNum}-${year}`;

                if (!weeks[label]) weeks[label] = { sum: 0, count: 0, sortKey: d.getTime() };
                weeks[label].sum += parseInt(item.val);
                weeks[label].count += 1;
            });

            // On trie par date pour que le graphique soit chronologique
            return Object.keys(weeks)
                .sort((a, b) => weeks[a].sortKey - weeks[b].sortKey)
                .map(key => ({
                    label: key,
                    val: (weeks[key].sum / weeks[key].count).toFixed(1)
                }));
        }

        function updateDashboard() {
            const view = document.getElementById('viewType').value;
            const dateFilters = document.getElementById('dateFilters');
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const badge = document.getElementById('totalBadge');

            dateFilters.style.visibility = (view === 'location') ? 'hidden' : 'visible';

            if (myChart !== null) { myChart.destroy(); }

            // Logique de mise à jour du badge TOTAL en fonction de la période
            let currentDataKey = (view === 'ressources') ? 'ressources' : 'actifs';
            let filteredForStat = dataTime[currentDataKey].filter(d => d.date >= start && d.date <= end);
            let totalPeriod = filteredForStat.reduce((acc, curr) => acc + parseInt(curr.val), 0);

            let labelBadge = (view === 'ressources') ? "Total Connexions" : "Total Apprenants";
            badge.innerText = `${labelBadge} (période) : ${totalPeriod.toLocaleString()}`;

            if (view === 'location') {
                badge.innerText = "Top 20 Villes (Total)";
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: dataLocation.map(d => d.Location),
                        datasets: [{ label: 'Sessions', data: dataLocation.map(d => d.val), backgroundColor: '#e67e22' }]
                    },
                    options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false }
                });
            }
            else if (view === 'moyenne_hebdo') {
                const filteredForAverage = dataTime.actifs.filter(d => d.date >= start && d.date <= end);
                const weeklyData = calculateWeeklyFromFiltered(filteredForAverage);
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: weeklyData.map(d => d.label),
                        datasets: [{ label: 'Moyenne quot. sur la période', data: weeklyData.map(d => d.val), backgroundColor: '#9b59b6', borderRadius: 5 }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }
            else {
                const filtered = dataTime[view].filter(d => d.date >= start && d.date <= end);
                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: filtered.map(d => d.date),
                        datasets: [{
                            label: view === 'actifs' ? 'Apprenants' : 'Connexions',
                            data: filtered.map(d => parseInt(d.val)),
                            borderColor: view === 'actifs' ? '#2980b9' : '#27ae60',
                            backgroundColor: view === 'actifs' ? 'rgba(41, 128, 185, 0.1)' : 'rgba(39, 174, 96, 0.1)',
                            fill: true, tension: 0.3
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }
        }

        document.getElementById('viewType').addEventListener('change', updateDashboard);
        document.getElementById('startDate').addEventListener('change', updateDashboard);
        document.getElementById('endDate').addEventListener('change', updateDashboard);

        updateDashboard();
    </script>
</body>
</html>
