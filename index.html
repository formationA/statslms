<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse LMS - statsLMS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .stat-badge {
            background: #34495e;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            min-width: 120px;
            text-align: center;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .chart-wrapper {
            position: relative;
            height: 500px;
            width: 100%;
        }

        label {
            font-weight: bold;
            color: #555;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>Tableau de Bord LMS</h1>
            <div class="stat-badge" id="totalBadge">Initialisation...</div>
        </div>

        <div class="filter-bar">
            <div>
                <label for="viewType">Vue :</label>
                <select id="viewType">
                    <option value="sessions">👥 Apprenants (Sessions)</option>
                    <option value="actifs" selected>📈 Apprenants Actifs</option>
                    <option value="ressources">🔗 Connexions Ressources</option>
                    <option value="moyenne_hebdo">📊 Moyenne Hebdo (Actifs)</option>
                    <option value="location">📍 Par Ville</option>
                </select>
            </div>
            <div id="dateFilters">
                <label>Période :</label>
                <input type="date" id="startDate" value="2026-01-01">
                <input type="date" id="endDate">
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="mainChart"></canvas>
        </div>
    </div>


    <script>
        let dataStore = { sessions: [], actifs: [], ressources: [], location: [] };
        let myChart = null;
        const ctx = document.getElementById('mainChart').getContext('2d');

        // Dates par défaut (février à mars 2026 selon vos fichiers)
        document.getElementById('startDate').value = "2026-01-01";
        document.getElementById('endDate').value = "2026-12-31";

        async function fetchData(url) {
            try {
                const response = await fetch(url + '?v=' + Date.now());
                if (!response.ok) return [];
                return await response.json();
            } catch (e) {
                console.error("Erreur sur : " + url);
                return [];
            }
        }

        async function init() {
            // Chargement des 4 fichiers avec les noms de votre dossier
            const [sessions, actifs, ressources, villes] = await Promise.all([
                fetchData('apprenants_dans_des_sessions.json'),
                fetchData('apprenants_actifs_sur_le_lms.json'),
                fetchData('connexion_aux_ressources.json'),
                fetchData('blocks_per_location.json')
            ]);

            dataStore.sessions = sessions;
            dataStore.actifs = actifs;
            dataStore.ressources = ressources;
            dataStore.location = villes;

            updateDashboard();
        }

        function updateDashboard() {
            const view = document.getElementById('viewType').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const badge = document.getElementById('totalBadge');

            if (myChart) myChart.destroy();

            // 1. CAS SESSIONS (Total unique)
            if (view === 'sessions') {
                document.getElementById('dateFilters').style.visibility = 'hidden';
                const data = dataStore.sessions[0] || {};
                const rawVal = data["Valeurs distinctes de Progresses → User"] || "0";
                const total = parseInt(rawVal.replace(/,/g, '')) || 0;
                badge.innerText = `Total : ${total.toLocaleString()}`;
                ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
                return;
            }

            document.getElementById('dateFilters').style.visibility = (view === 'location') ? 'hidden' : 'visible';

            // 2. CAS VILLES (Location / Nombre de lignes)
            if (view === 'location') {
              
                const topVilles = [...dataStore.location]
                    .sort((a, b) => (parseInt(b["Nombre de lignes"]) || 0) - (parseInt(a["Nombre de lignes"]) || 0))
                    .slice(0, 20);
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: topVilles.map(d => d.Location || "Inconnu"),
                        datasets: [{
                            label: 'Nombre de lignes',
                            data: topVilles.map(d => parseInt(d["Nombre de lignes"]) || 0),
                            backgroundColor: '#e67e22'
                        }]
                    },
                    options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false }
                });
                badge.innerText = "Top 20 Villes";
                return;
            }

            // 3. CAS RESSOURCES & ACTIFS
            let keyName = (view === 'ressources') ? "resource_connections" : "apprenants_actifs";
            let sourceData = (view === 'moyenne_hebdo') ? dataStore.actifs : dataStore[view];

            let filtered = sourceData
                .filter(d => d.date && d.date >= start && d.date <= end)
                .map(d => ({
                    date: d.date,
                    val: parseInt(d[keyName]) || 0
                }))
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            let total = filtered.reduce((a, b) => a + b.val, 0);
            badge.innerText = `Total : ${total.toLocaleString()}`;

            if (view === 'moyenne_hebdo') {
                const weekly = calculateWeekly(filtered);
                // Utilisation du Deep Purple #512da8 pour une moyenne hebdomadaire plus soutenue
                renderChart('bar', weekly.map(d => d.label), weekly.map(d => d.val), 'Moyenne quotidienne', '#512da8');
            } else {
                let color = (view === 'actifs') ? '#2980b9' : '#27ae60';
                renderChart('line', filtered.map(d => d.date), filtered.map(d => d.val), view, color);
            }
        }

        function renderChart(type, labels, data, label, color) {
            // On crée une version très claire pour l'intérieur (ex: 20% d'opacité avec '33')
            const lightColor = color + '33';

            myChart = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        // La bordure utilise la couleur pleine (#512da8)
                        borderColor: color,
                        // L'intérieur utilise la couleur claire
                        backgroundColor: lightColor,
                        // Épaisseur de la bordure (2px pour qu'elle soit bien visible)
                        borderWidth: 2,
                        // On active le remplissage pour les lignes et les barres
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    // Garder l'axe Y pour les villes et X pour le reste
                    indexAxis: (label === 'Nombre de lignes') ? 'y' : 'x',
                    plugins: {
                        legend: {
                            display: true,
                            labels: { color: '#333', font: { weight: 'bold' } }
                        }
                    }
                }
            });
        }

        function calculateWeekly(data) {
            const weeks = {};
            data.forEach(item => {
                const d = new Date(item.date);
                const year = d.getFullYear();
                const tempDate = new Date(d.valueOf());
                tempDate.setDate(tempDate.getDate() + 4 - (tempDate.getDay() || 7));
                const week = Math.ceil((((tempDate - new Date(year, 0, 1)) / 86400000) + 1) / 7);
                const label = `S${week}-${year}`;
                if (!weeks[label]) weeks[label] = { sum: 0, count: 0, sortKey: d.getTime() };
                weeks[label].sum += item.val;
                weeks[label].count += 1;
            });
            return Object.keys(weeks).sort((a, b) => weeks[a].sortKey - weeks[b].sortKey)
                .map(k => ({ label: k, val: (weeks[k].sum / weeks[k].count).toFixed(1) }));
        }

        document.querySelectorAll('select, input').forEach(el => el.addEventListener('change', updateDashboard));
        init();
    </script>

</body>
</html>
