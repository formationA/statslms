<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse LMS - statsLMS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .stat-badge {
            background: #34495e;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            min-width: 120px;
            text-align: center;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .chart-wrapper {
            position: relative;
            height: 500px;
            width: 100%;
        }

        label {
            font-weight: bold;
            color: #555;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>Tableau de Bord LMS</h1>
            <div class="stat-badge" id="totalBadge">Initialisation...</div>
        </div>

        <div class="filter-bar">
            <div>
                <label for="viewType">Vue :</label>
                <select id="viewType">
                    <option value="actifs">📈 Apprenants Actifs</option>
                    <option value="ressources" selected>🔗 Connexions Ressources</option>
                    <option value="moyenne_hebdo">📊 Moyenne Hebdo (Actifs)</option>
                    <option value="location">📍 Par Ville</option>
                </select>
            </div>
            <div id="dateFilters">
                <label>Période :</label>
                <input type="date" id="startDate" value="2026-01-01">
                <input type="date" id="endDate">
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script>
        let dataStore = { sessions: [], actifs: [], ressources: [], location: [] };
        let myChart = null;
        const ctx = document.getElementById('mainChart').getContext('2d');

        // Dates par défaut (vos données sont en 2026)
        document.getElementById('startDate').value = "2026-01-01";
        document.getElementById('endDate').value = "2026-12-31";

        // Fonction de chargement simple
        async function fetchData(url) {
            try {
                const response = await fetch(url + '?v=' + Date.now());
                if (!response.ok) return [];
                return await response.json();
            } catch (e) {
                console.error("Erreur sur : " + url);
                return [];
            }
        }

        async function init() {
            // Chargement des fichiers avec les noms exacts de votre image
            const [sessions, actifs, ressources, villes] = await Promise.all([
                fetchData('apprenants_dans_des_sessions.json'),
                fetchData('apprenants_actifs_sur_le_lms.json'),
                fetchData('connexion_aux_ressources.json'),
                fetchData('blocks_per_location.json')
            ]);

            dataStore.sessions = sessions;
            dataStore.actifs = actifs;
            dataStore.ressources = ressources;
            dataStore.location = villes;

            updateDashboard();
        }

        function updateDashboard() {
            const view = document.getElementById('viewType').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const badge = document.getElementById('totalBadge');

            if (myChart) myChart.destroy();

            document.getElementById('dateFilters').style.visibility = (view === 'location') ? 'hidden' : 'visible';

            // --- ÉTAPE CRUCIALE : On définit quelle colonne lire selon la vue ---
            let keyName = "val"; // Nom par défaut
            let sourceData = dataStore[view] || [];

            if (view === 'actifs' || view === 'moyenne_hebdo') {
                keyName = "apprenants_actifs";
                sourceData = dataStore.actifs;
            } else if (view === 'sessions') {
                // Vérifiez si c'est bien ce nom dans votre JSON sessions
                keyName = "apprenants_sessions";
            } else if (view === 'ressources') {
                // Vérifiez si c'est bien ce nom dans votre JSON ressources
                keyName = "connexions";
            }

            // --- Filtrage, Conversion et Tri ---
            let filtered = sourceData
                .filter(d => d.date && d.date >= start && d.date <= end)
                .map(d => ({
                    date: d.date,
                    val: parseInt(d[keyName]) || 0 // On transforme le nom spécifique en "val"
                }))
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            let total = filtered.reduce((a, b) => a + b.val, 0);
            badge.innerText = `Total : ${total.toLocaleString()}`;

            // Affichage du graphique
            if (view === 'location') {
                // Logique simplifiée pour les villes
                const villesData = dataStore.location.slice(0, 20);
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: villesData.map(d => d.location || d.Location || "Inconnu"),
                        datasets: [{ label: 'Sessions', data: villesData.map(d => parseInt(d.val) || 0), backgroundColor: '#e67e22' }]
                    },
                    options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false }
                });
            } else if (view === 'moyenne_hebdo') {
                const weekly = calculateWeekly(filtered);
                renderChart('bar', weekly.map(d => d.label), weekly.map(d => d.val), 'Moyenne Hebdo', '#9b59b6');
            } else {
                let color = view === 'actifs' ? '#2980b9' : (view === 'sessions' ? '#8e44ad' : '#27ae60');
                renderChart('line', filtered.map(d => d.date), filtered.map(d => d.val), view, color);
            }
        }

        function renderChart(type, labels, data, label, color) {
            myChart = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        borderColor: color,
                        backgroundColor: color + '1A',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function calculateWeekly(data) {
            const weeks = {};
            data.forEach(item => {
                const d = new Date(item.date);
                const year = d.getFullYear();
                const tempDate = new Date(d.valueOf());
                tempDate.setDate(tempDate.getDate() + 4 - (tempDate.getDay() || 7));
                const week = Math.ceil((((tempDate - new Date(year, 0, 1)) / 86400000) + 1) / 7);
                const label = `S${week}-${year}`;
                if (!weeks[label]) weeks[label] = { sum: 0, count: 0, sortKey: d.getTime() };
                weeks[label].sum += item.val;
                weeks[label].count += 1;
            });
            return Object.keys(weeks).sort((a, b) => weeks[a].sortKey - weeks[b].sortKey)
                .map(k => ({ label: k, val: (weeks[k].sum / weeks[k].count).toFixed(1) }));
        }

        document.querySelectorAll('select, input').forEach(el => el.addEventListener('change', updateDashboard));
        init();
    </script>
</body>
</html>
