<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse LMS - statsLMS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .stat-badge {
            background: #34495e;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            min-width: 120px;
            text-align: center;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .chart-wrapper {
            position: relative;
            height: 500px;
            width: 100%;
        }

        label {
            font-weight: bold;
            color: #555;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <div>
                <h1>Tableau de Bord LMS</h1>
                <small id="lastUpdate" style="color: #7f8c8d; font-style: italic;">Chargement de la date...</small>
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="stat-badge" id="liveBadge" style="background: #e74c3c;">En direct : --</div>
                <div class="stat-badge" id="totalBadge">Initialisation...</div>
            </div>
        </div>

        <div class="filter-bar">
            <div>
                <label for="viewType">Vue :</label>
                <select id="viewType">

                    <option value="actifs" selected>📈 Apprenants Actifs (Quotidien)</option>
                    <option value="moyenne_hebdo">📊 Moyenne Hebdo (Apprenants)</option>
                    <option value="ressources">🔗 Connexions Ressources (Quotidien)</option>
                    <option value="ouvertes">🔑 Sessions Ouvertes (Historique)</option>
                    <option value="location">📍 Répartition par centre (Top 20)</option>
                   
                </select>
            </div>
            <div id="dateFilters">
                <label>Période :</label>
                <input type="date" id="startDate" value="2026-01-01">
                <input type="date" id="endDate">
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="mainChart"></canvas>
        </div>
    </div>


    <script>
        let dataStore = { sessions: [], actifs: [], ressources: [], location: [], ouvertes: [], enCours: 0 };
       
        let myChart = null;
        const ctx = document.getElementById('mainChart').getContext('2d');

        document.getElementById('startDate').value = "2026-01-01";
        document.getElementById('endDate').value = "2026-12-31";

        async function fetchData(url) {
            try {
                const response = await fetch(url + '?v=' + Date.now());
                if (!response.ok) return [];
                return await response.json();
            } catch (e) {
                console.error("Erreur sur : " + url);
                return [];
            }
        }


        async function init() {
            // 1. On récupère les 6 fichiers (ajout de 'enCours' à la fin)
            const [sessions, actifs, ressources, villes, ouvertes, enCoursData] = await Promise.all([
                fetchData('apprenants_dans_des_sessions.json'),
                fetchData('apprenants_actifs_sur_le_lms.json'),
                fetchData('connexion_aux_ressources.json'),
                fetchData('blocks_per_location.json'),
                fetchData('new_blocks_over_time.json'),
                fetchData('nombre_d_apprenants_en_cours.json') // Assurez-vous que l'ordre correspond
            ]);

            // --- LOGIQUE D'AFFICHAGE DU NOMBRE EN COURS ---
            // Utilisation de la variable récupérée juste au-dessus
            if (enCoursData && enCoursData.length > 0) {
                // On suppose que le JSON est de type [{"count": 42}]
                const nbEnCours = enCoursData[0].count || 0;
                document.getElementById('liveBadge').innerText = `En cours : ${nbEnCours}`;
            } else {
                document.getElementById('liveBadge').innerText = `En cours : 0`;
            }

            // --- LOGIQUE DE DATE PERSONNALISÉE ---
            if (ouvertes && ouvertes.length > 0) {
                const lastEntry = ouvertes[ouvertes.length - 1];
                const rawDateStr = lastEntry["Start Date: Heure"];

                if (rawDateStr) {
                    const monthMap = { "janvier": 0, "février": 1, "mars": 2, "avril": 3, "mai": 4, "juin": 5, "juillet": 6, "août": 7, "septembre": 8, "octobre": 9, "novembre": 10, "décembre": 11 };
                    const parts = rawDateStr.toLowerCase().replace(/,/g, '').split(' ');

                    const month = monthMap[parts[0]];
                    const day = parseInt(parts[1]);
                    const year = parseInt(parts[2]);
                    let hour = parseInt(parts[3]);

                    if (month !== undefined && !isNaN(day)) {
                        const dateObj = new Date(year, month, day, hour, 0);
                        dateObj.setHours(dateObj.getHours() - 1);

                        const finalDay = dateObj.getDate();
                        const finalMonth = parts[0];
                        const finalYear = dateObj.getFullYear();
                        const finalHour = dateObj.getHours().toString().padStart(2, '0');

                        document.getElementById('lastUpdate').innerText = `Dernière actualisation : ${finalDay} ${finalMonth} ${finalYear} - ${finalHour}h00`;
                    }
                }
            }

            // Stockage dans le dataStore global
            dataStore.sessions = sessions;
            dataStore.actifs = actifs;
            dataStore.ressources = ressources;
            dataStore.location = villes;

            // Traitement des sessions ouvertes pour le graphique
            if (ouvertes && ouvertes.length > 0) {
                const monthMap = { "janvier": 0, "février": 1, "mars": 2, "avril": 3, "mai": 4, "juin": 5, "juillet": 6, "août": 7, "septembre": 8, "octobre": 9, "novembre": 10, "décembre": 11 };

                dataStore.ouvertes = ouvertes
                    .filter(d => d["Start Date: Heure"])
                    .map(d => {
                        const parts = d["Start Date: Heure"].toLowerCase().replace(',', '').split(' ');
                        const m = monthMap[parts[0]];
                        const dy = parseInt(parts[1]);
                        const yr = parseInt(parts[2]);

                        let isoDate = null;
                        if (m !== undefined && !isNaN(dy) && !isNaN(yr)) {
                            isoDate = new Date(yr, m, dy).toISOString().split('T')[0];
                        }
                        return {
                            date: isoDate,
                            val: parseInt(d["Nombre de lignes"]?.replace(/,/g, '')) || 0
                        };
                    })
                    .filter(d => d.date !== null);
            }

            updateDashboard();
        }


        function updateDashboard() {
            const view = document.getElementById('viewType').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const badge = document.getElementById('totalBadge');

            if (myChart) myChart.destroy();

           
            document.getElementById('dateFilters').style.visibility = (view === 'location') ? 'hidden' : 'visible';

            if (view === 'location') {
                const topVilles = [...dataStore.location]
                    .sort((a, b) => (parseInt(b["Nombre de lignes"]) || 0) - (parseInt(a["Nombre de lignes"]) || 0))
                    .slice(0, 20);

                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: topVilles.map(d => d.Location || "Inconnu"),
                        datasets: [{
                            label: 'Nombre de sessions',
                            data: topVilles.map(d => parseInt(d["Nombre de lignes"]) || 0),
                            backgroundColor: '#e67e22'
                        }]
                    },
                    options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false }
                });
                badge.innerText = "Top 20 centres de formation";
                return;
            }

            let filtered = [];
            let color = '#2980b9';
            let chartLabel = "";

            if (view === 'ouvertes') {
                filtered = dataStore.ouvertes
                    .filter(d => d.date >= start && d.date <= end)
                    .sort((a, b) => new Date(a.date) - new Date(b.date));
                color = '#8e44ad';
                chartLabel = "Nombre de sessions ouvertes";
            } else {
                let keyName = (view === 'ressources') ? "resource_connections" : "apprenants_actifs";
                let sourceData = (view === 'moyenne_hebdo') ? dataStore.actifs : dataStore[view];

                filtered = sourceData
                    .filter(d => d.date && d.date >= start && d.date <= end)
                    .map(d => ({
                        date: d.date,
                        val: parseInt(d[keyName]) || 0
                    }))
                    .sort((a, b) => new Date(a.date) - new Date(b.date));

                if (view === 'actifs' || view === 'moyenne_hebdo') {
                    // Si c'est la moyenne, on met le violet et le texte spécifique
                    if (view === 'moyenne_hebdo') {
                        color = '#512da8';
                        chartLabel = "Moyenne des apprenants connectés";
                    } else {
                        // Si ce sont les actifs simples, on garde le bleu
                        color = '#2980b9';
                        chartLabel = "Nombre d'apprenants connectés";
                    }
                } else if (view === 'ressources') {
                    color = '#27ae60';
                    chartLabel = "Nombre de ressources lancées";
                }
            }

            let total = filtered.reduce((a, b) => a + b.val, 0);
            badge.innerText = `Total : ${total.toLocaleString()}`;

            if (view === 'moyenne_hebdo') {
                const weekly = calculateWeekly(filtered);
                renderChart('bar', weekly.map(d => d.label), weekly.map(d => d.val), chartLabel, '#512da8');
            } else {
                renderChart('line', filtered.map(d => d.date), filtered.map(d => d.val), chartLabel, color);
            }
        }

        function renderChart(type, labels, data, label, color) {
            const lightColor = color + '33';
            myChart = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        borderColor: color,
                        backgroundColor: lightColor,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            labels: { color: '#333', font: { weight: 'bold' } }
                        }
                    }
                }
            });
        }

        function calculateWeekly(data) {
            const weeks = {};
            data.forEach(item => {
                const d = new Date(item.date);
                const year = d.getFullYear();
                const tempDate = new Date(d.valueOf());
                tempDate.setDate(tempDate.getDate() + 4 - (tempDate.getDay() || 7));
                const week = Math.ceil((((tempDate - new Date(year, 0, 1)) / 86400000) + 1) / 7);
                const label = `S${week}-${year}`;
                if (!weeks[label]) weeks[label] = { sum: 0, count: 0, sortKey: d.getTime() };
                weeks[label].sum += item.val;
                weeks[label].count += 1;
            });
            return Object.keys(weeks).sort((a, b) => weeks[a].sortKey - weeks[b].sortKey)
                .map(k => ({ label: k, val: (weeks[k].sum / weeks[k].count).toFixed(1) }));
        }

        document.querySelectorAll('select, input').forEach(el => el.addEventListener('change', updateDashboard));
        init();
    </script>

</body>
</html>
