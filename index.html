<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse des données LMS - Complet</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .stat-badge {
            background: #34495e;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .chart-wrapper {
            position: relative;
            height: 500px;
            width: 100%;
        }

        label {
            font-weight: bold;
            color: #555;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>Tableau de Bord LMS - Complet & Auto</h1>
            <div class="stat-badge" id="totalBadge">Chargement...</div>
        </div>

        <div class="filter-bar">
            <div>
                <label for="viewType">Type de vue :</label>
                <select id="viewType">
                    <option value="actifs">📈 Apprenants Actifs (Quotidien)</option>
                    <option value="ressources" selected>🔗 Connexions Ressources (Quotidien)</option>
                    <option value="moyenne_hebdo">📊 Moyenne Hebdomadaire (Période)</option>
                    <option value="location">📍 Répartition par Ville (Top 20)</option>
                </select>
            </div>
            <div id="dateFilters">
                <label>Période :</label>
                <input type="date" id="startDate" value="2026-01-01">
                <input type="date" id="endDate">
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script>
        // On initialise les données vides
        let dataTime = { actifs: [], ressources: [] };
        let dataLocation = [];
        let myChart = null;
        const ctx = document.getElementById('mainChart').getContext('2d');

        // Réglage de la date de fin à Hier (J-1)
        const hier = new Date();
        hier.setDate(hier.getDate() - 1);
        document.getElementById('endDate').value = hier.toISOString().split('T')[0];

        // --- CHARGEMENT DES FICHIERS JSON ---
        async function loadAllData() {
            try {
                // On charge les 3 fichiers en même temps
                const [resActifs, resRessources, resLoc] = await Promise.all([
                    fetch('apprenants_actifs_sur_le_lms.json'),
                    fetch('connexion_aux_ressources.json'),
                    fetch('repartition_par_ville.json') // Assurez-vous que ce fichier existe
                ]);

                dataTime.actifs = await resActifs.json();
                dataTime.ressources = await resRessources.json();
                dataLocation = await resLoc.json();

                updateDashboard();
            } catch (err) {
                document.getElementById('totalBadge').innerText = "Erreur de fichiers JSON";
                console.error(err);
            }
        }

        function calculateWeeklyFromFiltered(filteredData) {
            const weeks = {};
            filteredData.forEach(item => {
                const d = new Date(item.date);
                const year = d.getFullYear();
                const tempDate = new Date(d.valueOf());
                tempDate.setDate(tempDate.getDate() + 4 - (tempDate.getDay() || 7));
                const yearStart = new Date(tempDate.getFullYear(), 0, 1);
                const weekNum = Math.ceil((((tempDate - yearStart) / 86400000) + 1) / 7);
                const label = `S${weekNum}-${year}`;
                if (!weeks[label]) weeks[label] = { sum: 0, count: 0, sortKey: d.getTime() };
                weeks[label].sum += parseInt(item.val);
                weeks[label].count += 1;
            });
            return Object.keys(weeks).sort((a, b) => weeks[a].sortKey - weeks[b].sortKey)
                .map(key => ({ label: key, val: (weeks[key].sum / weeks[key].count).toFixed(1) }));
        }

        function updateDashboard() {
            const view = document.getElementById('viewType').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const badge = document.getElementById('totalBadge');
            const dateFilters = document.getElementById('dateFilters');

            dateFilters.style.visibility = (view === 'location') ? 'hidden' : 'visible';
            if (myChart !== null) { myChart.destroy(); }

            // Logique de calcul pour le badge
            let currentKey = (view === 'ressources') ? 'ressources' : 'actifs';
            let filtered = dataTime[currentKey].filter(d => d.date >= start && d.date <= end);
            let total = filtered.reduce((acc, curr) => acc + parseInt(curr.val), 0);
            badge.innerText = `Total : ${total.toLocaleString()}`;

            if (view === 'location') {
                badge.innerText = "Top 20 Villes (Total)";
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: dataLocation.slice(0, 20).map(d => d.Location),
                        datasets: [{ label: 'Sessions', data: dataLocation.slice(0, 20).map(d => d.val), backgroundColor: '#e67e22' }]
                    },
                    options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false }
                });
            } else if (view === 'moyenne_hebdo') {
                const weeklyData = calculateWeeklyFromFiltered(filtered);
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: weeklyData.map(d => d.label),
                        datasets: [{ label: 'Moyenne quot.', data: weeklyData.map(d => d.val), backgroundColor: '#9b59b6' }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            } else {
                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: filtered.map(d => d.date),
                        datasets: [{
                            label: view === 'actifs' ? 'Apprenants' : 'Connexions',
                            data: filtered.map(d => parseInt(d.val)),
                            borderColor: view === 'actifs' ? '#2980b9' : '#27ae60',
                            fill: true, tension: 0.3
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }
        }

        document.getElementById('viewType').addEventListener('change', updateDashboard);
        document.getElementById('startDate').addEventListener('change', updateDashboard);
        document.getElementById('endDate').addEventListener('change', updateDashboard);

        loadAllData();
    </script>
</body>
</html>
