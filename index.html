<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse des données LMS - Dynamique</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .stat-badge {
            background: #34495e;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .chart-wrapper {
            position: relative;
            height: 500px;
            width: 100%;
        }

        label {
            font-weight: bold;
            color: #555;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>Tableau de Bord LMS (Auto-actualisé)</h1>
            <div class="stat-badge" id="totalBadge">Chargement des données...</div>
        </div>

        <div class="filter-bar">
            <div>
                <label for="viewType">Type de vue :</label>
                <select id="viewType">
                    <option value="actifs">📈 Apprenants Actifs</option>
                    <option value="ressources" selected>🔗 Connexions Ressources</option>
                </select>
            </div>
            <div>
                <label>Période :</label>
                <input type="date" id="startDate" value="2026-01-01">
                <input type="date" id="endDate">
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script>
        let dataTime = { actifs: [], ressources: [] };
        let myChart = null;
        const ctx = document.getElementById('mainChart').getContext('2d');

        // Initialisation de la date de fin à Hier (J-1)
        const hier = new Date();
        hier.setDate(hier.getDate() - 1);
        document.getElementById('endDate').value = hier.toISOString().split('T')[0];

        // FONCTION POUR CHARGER LES JSON EXTERNES
        async function loadData() {
            try {
                const resActifs = await fetch('apprenants_actifs_sur_le_lms.json');
                const resRessources = await fetch('connexion_aux_ressources.json');

                const jsonActifs = await resActifs.json();
                const jsonRessources = await resRessources.json();

                // On prépare les données (on s'assure que 'val' est un nombre)
                dataTime.actifs = jsonActifs.map(d => ({ date: d.date, val: parseInt(d.val) }));
                dataTime.ressources = jsonRessources.map(d => ({ date: d.date, val: parseInt(d.val) }));

                updateDashboard();
            } catch (error) {
                document.getElementById('totalBadge').innerText = "Erreur de chargement JSON";
                console.error("Erreur:", error);
            }
        }

        function updateDashboard() {
            const view = document.getElementById('viewType').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const badge = document.getElementById('totalBadge');

            if (myChart !== null) { myChart.destroy(); }

            // Filtrage selon les dates choisies
            const filtered = dataTime[view].filter(d => d.date >= start && d.date <= end)
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            const total = filtered.reduce((acc, curr) => acc + curr.val, 0);
            badge.innerText = `Total : ${total.toLocaleString()}`;

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: filtered.map(d => d.date),
                    datasets: [{
                        label: view === 'actifs' ? 'Apprenants' : 'Connexions',
                        data: filtered.map(d => d.val),
                        borderColor: view === 'actifs' ? '#2980b9' : '#27ae60',
                        backgroundColor: view === 'actifs' ? 'rgba(41, 128, 185, 0.1)' : 'rgba(39, 174, 96, 0.1)',
                        fill: true, tension: 0.3
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        document.getElementById('viewType').addEventListener('change', updateDashboard);
        document.getElementById('startDate').addEventListener('change', updateDashboard);
        document.getElementById('endDate').addEventListener('change', updateDashboard);

        // Lancement au chargement de la page
        loadData();
    </script>
</body>
</html>
