<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse LMS - statsLMS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .stat-badge {
            background: #34495e;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            min-width: 120px;
            text-align: center;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .chart-wrapper {
            position: relative;
            height: 500px;
            width: 100%;
        }

        label {
            font-weight: bold;
            color: #555;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>Tableau de Bord LMS</h1>
            <div class="stat-badge" id="totalBadge">Initialisation...</div>
        </div>

        <div class="filter-bar">
            <div>
                <label for="viewType">Vue :</label>
                <select id="viewType">
                    <option value="sessions">👥 Apprenants (Sessions)</option>
                    <option value="actifs">📈 Apprenants Actifs</option>
                    <option value="ressources" selected>🔗 Connexions Ressources</option>
                    <option value="moyenne_hebdo">📊 Moyenne Hebdo (Actifs)</option>
                    <option value="location">📍 Par Ville</option>
                </select>
            </div>
            <div id="dateFilters">
                <label>Période :</label>
                <input type="date" id="startDate" value="2026-01-01">
                <input type="date" id="endDate">
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script>
        // Initialisation de l'objet de stockage unique
        let dataStore = {
            sessions: [],
            actifs: [],
            ressources: [],
            location: []
        };

        let myChart = null;
        const ctx = document.getElementById('mainChart').getContext('2d');

        // Réglage auto sur J-1
        const hier = new Date();
        hier.setDate(hier.getDate() - 1);
        document.getElementById('endDate').value = hier.toISOString().split('T')[0];

        async function fetchData(url) {
            try {
                const response = await fetch(url + '?v=' + Date.now());
                if (!response.ok) return [];
                const data = await response.json();

                // Normalisation : on transforme "apprenants_actifs" (ou autre) en "val"
                return data.map(item => {
                    let value = 0;
                    // On cherche la clé qui contient la valeur numérique
                    for (let key in item) {
                        if (key !== "date" && key !== "location" && key !== "Location") {
                            value = item[key];
                        }
                    }
                    return {
                        date: item.date || null,
                        location: item.location || item.Location || null,
                        val: value
                    };
                });
            } catch (e) {
                console.error("Erreur sur : " + url, e);
                return [];
            }
        }

        async function init() {
            // Correction des noms de fichiers pour correspondre exactement à l'image
            const [sessions, actifs, ressources, villes] = await Promise.all([
                fetchData('apprenants_dans_des_sessions.json'), // Un seul underscore ici
                fetchData('apprenants_actifs_sur_le_lms.json'),
                fetchData('connexion_aux_ressources.json'),
                fetchData('blocks_per_location.json')
            ]);

            dataStore.sessions = sessions;
            dataStore.actifs = actifs;
            dataStore.ressources = ressources;
            dataStore.location = villes;

            console.log("Données chargées :", dataStore); // Pour vérifier dans la console (F12)
            updateDashboard();
        }

        function calculateWeekly(data) {
            if (!data.length) return [];
            const weeks = {};
            data.forEach(item => {
                const val = parseInt(item.val) || 0;
                const d = new Date(item.date);
                if (isNaN(d.getTime())) return;
                const year = d.getFullYear();
                const tempDate = new Date(d.valueOf());
                tempDate.setDate(tempDate.getDate() + 4 - (tempDate.getDay() || 7));
                const week = Math.ceil((((tempDate - new Date(year, 0, 1)) / 86400000) + 1) / 7);
                const label = `S${week}-${year}`;
                if (!weeks[label]) weeks[label] = { sum: 0, count: 0, sortKey: d.getTime() };
                weeks[label].sum += val;
                weeks[label].count += 1;
            });
            return Object.keys(weeks).sort((a, b) => weeks[a].sortKey - weeks[b].sortKey)
                .map(k => ({ label: k, val: (weeks[k].sum / weeks[k].count).toFixed(1) }));
        }

        function updateDashboard() {
            const view = document.getElementById('viewType').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const badge = document.getElementById('totalBadge');

            if (myChart) myChart.destroy();

            document.getElementById('dateFilters').style.visibility = (view === 'location') ? 'hidden' : 'visible';

            // 1. Déterminer la bonne clé JSON selon le fichier
            let keyName = "val"; // Par défaut
            if (view === "actifs" || view === "moyenne_hebdo") keyName = "apprenants_actifs";
            if (view === "sessions") keyName = "apprenants_sessions"; // Vérifiez si c'est le cas dans l'autre fichier
            if (view === "ressources") keyName = "connexions"; // Vérifiez également ici

            // 2. Récupérer les données
            let sourceData = dataStore[view] || [];
            if (view === 'moyenne_hebdo') sourceData = dataStore.actifs;

            // 3. Filtrer et calculer (on utilise [keyName] au lieu de .val)
            let filtered = sourceData
                .filter(d => d.date >= start && d.date <= end)
                .map(d => ({
                    date: d.date,
                    val: parseInt(d[keyName]) || 0  // On convertit dynamiquement
                }));

            // Trier par date (pour éviter les graphiques en zigzag)
            filtered.sort((a, b) => new Date(a.date) - new Date(b.date));

            let total = filtered.reduce((a, b) => a + b.val, 0);
            badge.innerText = `Total : ${total.toLocaleString()}`;

            // 4. Rendu du graphique
            if (view === 'moyenne_hebdo') {
                // ... (votre code calculateWeekly existant fonctionnera car il utilise .val après le map ci-dessus)
            } else {
                let color = view === 'actifs' ? '#2980b9' : (view === 'sessions' ? '#8e44ad' : '#27ae60');
                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: filtered.map(d => d.date),
                        datasets: [{
                            label: view,
                            data: filtered.map(d => d.val),
                            borderColor: color,
                            backgroundColor: color + '1A',
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }
        }

        document.querySelectorAll('select, input').forEach(el => el.addEventListener('change', updateDashboard));

        init();
    </script>
</body>
</html>
