<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur de Présentation - IT Pedagogie</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module@3.0.0/image-resize.min.js"></script>

    <style>
        :root {
            --aftral-blue: #2d3663;
            --accent: #5c6eb1;
            --bg-light: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            background: #d1d5db;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- CORRECTIFS ALIGNEMENT ET LISTES --- */
        .ql-align-center {
            text-align: center;
        }

        .ql-align-right {
            text-align: right;
        }

        .ql-align-justify {
            text-align: justify;
        }

        .ql-editor ul {
            padding-left: 1.5em !important;
            list-style-type: disc;
        }

        .ql-editor ol {
            padding-left: 1.5em !important;
            list-style-type: decimal;
        }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }

        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: scale(0.8);
            animation: popIn 0.3s forwards;
        }

        .modal-icon {
            font-size: 50px;
            margin-bottom: 15px;
            display: block;
        }

        .modal-title {
            font-weight: bold;
            font-size: 1.2rem;
            color: #1e293b;
            margin-bottom: 10px;
        }

        .modal-text {
            color: #64748b;
            margin-bottom: 25px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-cancel {
            background: #e2e8f0;
            color: #475569;
        }

        .btn-confirm {
            background: #ef4444;
            color: white;
        }

        .modal-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes popIn {
            to {
                transform: scale(1);
            }
        }

        .top-bar {
            padding: 10px 20px;
            background: #2c3e50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            z-index: 100;
        }

        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #slides-sidebar {
            width: 180px;
            background: #334155;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .slide-thumb {
            padding: 12px;
            background: #475569;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            text-align: left;
            border: 2px solid transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: 0.2s;
        }

            .slide-thumb.active {
                border-color: #38bdf8;
                background: #1e293b;
            }

        #editor {
            width: 500px;
            background: white;
            padding: 25px;
            border-right: 1px solid #94a3b8;
            overflow-y: auto;
        }

        h2 {
            color: var(--aftral-blue);
            font-size: 1rem;
            text-transform: uppercase;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 8px;
            margin-bottom: 20px;
        }

        .group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 700;
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            background: #f1f5f9;
            padding: 5px;
            border: 1px solid #cbd5e1;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
        }

            .toolbar button, .toolbar select {
                padding: 2px;
                cursor: pointer;
                border: 1px solid #cbd5e1;
                background: white;
                border-radius: 3px;
            }

        #ed-content {
            width: 100%;
            height: 250px;
            border: 1px solid #cbd5e1;
            border-radius: 0 0 6px 6px;
            font-size: 14px;
            background: white;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn-add {
            background: #10b981;
            color: white;
            width: 100%;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
            width: 100%;
            margin-bottom: 10px;
            font-size: 0.75rem;
            padding: 8px;
        }

        .btn-save {
            background: #64748b;
            color: white;
        }

        .btn-export {
            background: var(--aftral-blue);
            color: white;
        }

        .btn-preview {
            background: #f59e0b;
            color: white;
        }

        .btn-load {
            background: #94a3b8;
            color: white;
        }

        #preview-zone {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #e2e8f0;
        }

        #canvas-container {
            background: white;
            width: 100%;
            max-width: 100%;
            aspect-ratio: 16/9;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div id="modal-overlay">
        <div class="modal-box">
            <span class="modal-icon">🗑️</span>
            <div class="modal-title">Supprimer la page ?</div>
            <div class="modal-text">Cette action est irréversible. Voulez-vous vraiment continuer ?</div>
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeDeleteModal()">Annuler</button>
                <button class="modal-btn btn-confirm" onclick="confirmDelete()">Supprimer</button>
            </div>
        </div>
    </div>

    <div class="top-bar">
        <span style="font-weight: bold;">Générateur de Présentation - IT Pedagogie</span>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-preview" onclick="previewFullscreen()" style="padding: 5px 15px; font-size: 0.8rem;">👁️ Aperçu</button>
            <button class="btn btn-load" onclick="document.getElementById('fileInput').click()" style="padding: 5px 15px; font-size: 0.8rem;">📂 Charger</button>
            <input type="file" id="fileInput" style="display:none" accept=".json" onchange="loadProject(event)">
            <a href="index.html" style="color: white; text-decoration: none; font-weight: bold; border: 1px solid white; padding: 5px 15px; border-radius: 5px; font-size: 0.8em;">⬅️ Retour</a>
        </div>
    </div>

    <div class="main-wrapper">
        <div id="slides-sidebar">
            <button class="btn btn-add" onclick="addSlide()">+ Ajouter page</button>
            <button class="btn btn-delete" onclick="openDeleteModal()">🗑️ Supprimer</button>
            <div id="thumb-list"></div>
        </div>

        <div id="editor">
            <h2>Configuration</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                <div class="group">
                    <label>Couleur Thème</label>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="color" id="ed-color" oninput="updateCurrentSlide()" style="width: 50px; height: 40px; padding: 2px; cursor: pointer;">
                        <span id="color-code" style="font-family: monospace; font-size: 0.9rem; color: #64748b;">#2D3663</span>
                    </div>
                </div>
                <div class="group" style="margin-bottom: 0;">
                    <label>Hauteur Bandeau (px)</label>
                    <input type="number" id="ed-header-height" value="80" min="20" max="200" oninput="updateCurrentSlide()">
                </div>
            </div>

            <div class="group">
                <label>Titre</label>
                <input type="text" id="ed-title" oninput="updateCurrentSlide()">
            </div>

            <div class="group">
                <label>Contenu</label>
                <div id="toolbar-container" class="toolbar">
                    <button class="ql-bold"><b>B</b></button>
                    <button class="ql-italic"><i>I</i></button>
                    <button class="ql-underline"><u>U</u></button>
                    <select class="ql-size">
                        <option value="0.8em">Petit</option>
                        <option selected>Normal</option>
                        <option value="1.8em">Grand</option>
                        <option value="3.5em">Enorme</option>
                    </select>
                    <button class="ql-align" value=""></button>
                    <button class="ql-align" value="center"></button>
                    <button class="ql-align" value="right"></button>
                    <button class="ql-list" value="bullet">• Liste</button>
                    <button class="ql-image">🖼️</button>
                </div>
                <div id="ed-content"></div>
            </div>

            <div class="group">
                <label>Référence</label>
                <input type="text" id="ed-ref" oninput="updateCurrentSlide()">
            </div>
            <div class="controls">
                <button class="btn btn-save" onclick="saveProject()">💾 Sauvegarder</button>
                <button class="btn btn-export" onclick="downloadFullHTML()">📥 Générer HTML</button>
            </div>
        </div>

        <div id="preview-zone">
            <div id="canvas-container">
                <div id="canvas-content" style="height: 100%;"></div>
            </div>
        </div>
    </div>

    <script>
        let slides = [{ title: "Titre", content: "<ul><li>Contenu</li></ul>", ref: "REF-2026", color: "#2d3663", headerHeight: 80 }];
        let currentIndex = 0;

        // --- CONFIGURATION QUILL ---
        window.Quill = Quill; // Requis pour le module ImageResize

        var Size = Quill.import('attributors/style/size');
        Size.whitelist = ['0.8em', '1.8em', '3.5em'];
        Quill.register(Size, true);

        var Align = Quill.import('attributors/style/align');
        Quill.register(Align, true);

        var quill = new Quill('#ed-content', {
            theme: 'snow',
            modules: {
                toolbar: '#toolbar-container',
                imageResize: { displaySize: true }
            }
        });

        quill.on('text-change', function () {
            updateCurrentSlide();
        });

        /* --- FONCTIONS --- */
        function openDeleteModal() { if (slides.length > 1) document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeDeleteModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function confirmDelete() { slides.splice(currentIndex, 1); currentIndex = Math.max(0, currentIndex - 1); closeDeleteModal(); switchSlide(currentIndex); }

        function renderSidebar() {
            const container = document.getElementById('thumb-list');
            container.innerHTML = '';
            slides.forEach((slide, index) => {
                const div = document.createElement('div');
                div.className = `slide-thumb ${index === currentIndex ? 'active' : ''}`;
                div.innerText = `${index + 1}. ${slide.title || 'Sans titre'}`;
                div.onclick = () => switchSlide(index);
                container.appendChild(div);
            });
        }

        function switchSlide(index) {
            currentIndex = index;
            const s = slides[currentIndex];
            document.getElementById('ed-title').value = s.title;
            document.getElementById('ed-ref').value = s.ref;
            document.getElementById('ed-color').value = s.color || "#2d3663";
            document.getElementById('ed-header-height').value = s.headerHeight || 80;
            quill.root.innerHTML = s.content || "";
            renderPreview();
            renderSidebar();
        }

        function updateCurrentSlide() {
            if (!slides[currentIndex]) return;
            slides[currentIndex].title = document.getElementById('ed-title').value;
            slides[currentIndex].content = quill.root.innerHTML;
            slides[currentIndex].ref = document.getElementById('ed-ref').value;
            const selectedColor = document.getElementById('ed-color').value;
            slides[currentIndex].color = selectedColor;
            document.getElementById('color-code').innerText = selectedColor.toUpperCase();
            slides[currentIndex].headerHeight = document.getElementById('ed-header-height').value;

            localStorage.setItem('it_pedago_draft', JSON.stringify(slides));
            renderPreview();
            renderSidebar();
        }

        function checkLocalStorage() {
            const saved = localStorage.getItem('it_pedago_draft');
            if (saved) {
                if (confirm("Une sauvegarde locale a été trouvée. Voulez-vous la charger ?")) {
                    slides = JSON.parse(saved);
                    switchSlide(0);
                }
            }
        }

        function addSlide() {
            slides.push({
                title: "Nouvelle Page", content: "", ref: slides[0].ref,
                color: slides[currentIndex].color, headerHeight: slides[currentIndex].headerHeight
            });
            switchSlide(slides.length - 1);
        }

        function renderPreview() {
            const s = slides[currentIndex];
            const activeColor = s.color || "#2d3663";
            const h = s.headerHeight || 80;
            document.getElementById('canvas-content').innerHTML = `
                    <div style="height: 100%; display: flex; flex-direction: column; font-family: sans-serif; background: white;">
                        <div style="background: ${activeColor}; color: white; height: ${h}px; display: flex; align-items: center; padding: 0 15px;">
                            <h1 style="margin: 0 !important; padding: 0; font-size: 1rem; line-height: 1.1;">${s.title}</h1>
                        </div>
                        <div class="ql-editor" style="flex: 1; padding: 20px; font-size: 1rem; color: #334155; line-height: 1.4; overflow:auto;">
                            ${s.content}
                        </div>
                        <div style="padding: 5px 15px; background: #f8fafc; border-top: 1px solid ${activeColor}; display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; color: #64748b;">
                            <div><b>AFTRAL</b> | ${s.ref}</div>
                            <div>Page ${currentIndex + 1} / ${slides.length}</div>
                        </div>
                    </div>`;
        }

        function generateHTMLContent() {
            const allSlidesHTML = slides.map((s, i) => `
                    <div class="slide" id="slide-${i}" style="display: ${i === 0 ? 'block' : 'none'}; height: 100vh; width: 100vw; overflow: hidden;">
                        <div style="height: 100%; display: flex; flex-direction: column; background: white; font-family: sans-serif;">
                            <div style="background: ${s.color || '#2d3663'}; color: white; height: ${s.headerHeight || 80}px; display: flex; align-items: center; padding: 0 40px;">
                                <h1 style="margin: 0 !important; padding: 0; font-size: 2.5rem; line-height: 1.1;">${s.title}</h1>
                            </div>
                            <div class="ql-editor" style="flex: 1; padding: 40px 60px; font-size: 2.5rem; color: #1e293b; line-height: 1.4; overflow: auto;">
                                ${s.content}
                            </div>
                            <div style="height: 80px;"></div>
                        </div>
                    </div>`).join('');

            return `<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
                    <style>
                        body { margin: 0; overflow: hidden; background: #fff; font-family: sans-serif; }
                        .ql-align-center { text-align: center; }
                        .ql-align-right { text-align: right; }
                        .ql-align-justify { text-align: justify; }
                        .ql-editor ul { padding-left: 1.5em; list-style-type: disc; }
                        .ql-editor ol { padding-left: 1.5em; list-style-type: decimal; }
                        img { max-width: 100%; height: auto; border-radius: 10px; }
                        .footer {
                            position: fixed; bottom: 0; left: 0; width: 100%;
                            background: #f8fafc; border-top: 4px solid #2d3663;
                            display: grid; grid-template-columns: 1fr auto 1fr;
                            align-items: center; padding: 10px 40px; box-sizing: border-box; height: 80px;
                        }
                        .btn-nav { padding: 15px 35px; cursor: pointer; background: #2d3663; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 1.5rem; }
                        .btn-nav:disabled { background: #cbd5e1; cursor: not-allowed; color: #94a3b8; }
                    </style></head><body>
                        ${allSlidesHTML}
                        <div class="footer" id="f">
                            <div style="font-size: 1.5rem; color:#475569;"><b>AFTRAL</b> | ${slides[0].ref}</div>
                            <div style="color: #94a3b8; font-size: 1.2rem;">Page <span id="cp">1</span> / ${slides.length}</div>
                            <div style="text-align:right;">
                                <button class="btn-nav" id="bp" onclick="ch(-1)">←</button>
                                <button class="btn-nav" id="bs" onclick="ch(1)">→</button>
                            </div>
                        </div>
                        <script>
                            let c=0, t=${slides.length}, colors=${JSON.stringify(slides.map(s => s.color || "#2d3663"))};
                            function up(){
                                document.getElementById('cp').innerText = c + 1;
                                document.getElementById('f').style.borderTopColor = colors[c];
                                document.getElementById('bp').disabled = (c === 0);
                                const nextBtn = document.getElementById('bs');
                                nextBtn.innerText = (c === t - 1) ? "FIN" : "→";
                                if(c === t - 1) nextBtn.style.background = "#ef4444"; else nextBtn.style.background = "#2d3663";
                            }
                            function ch(d){
                                let n=c+d; if(n>=0 && n<t){
                                    document.getElementById('slide-'+c).style.display='none';
                                    c=n; document.getElementById('slide-'+c).style.display='block';
                                    up();
                                }
                            }
                            document.addEventListener('keydown', e => { if(e.key==="ArrowRight") ch(1); if(e.key==="ArrowLeft") ch(-1); });
                            up();
                        <\/script></body></html>`;
        }

        function saveProject() {
            const blob = new Blob([JSON.stringify(slides)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = (slides[0].ref || 'projet') + '.json';
            a.click();
        }

        function loadProject(event) {
            const reader = new FileReader();
            reader.onload = (e) => { slides = JSON.parse(e.target.result); switchSlide(0); };
            reader.readAsText(event.target.files[0]);
        }

        function downloadFullHTML() {
            const blob = new Blob([generateHTMLContent()], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = (slides[0].ref || 'Presentation') + '.html';
            a.click();
        }

        function previewFullscreen() {
            const win = window.open('', '_blank');
            win.document.write(generateHTMLContent());
            win.document.close();
        }

        window.addEventListener('DOMContentLoaded', () => {
            checkLocalStorage();
            if (slides.length > 0) switchSlide(0);
        });
    </script>
</body>
</html>
