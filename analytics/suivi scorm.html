<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyseur SCORM - Diagnostic Profond</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 30px;
        }

        .upload-zone {
            border: 2px dashed #38bdf8;
            padding: 40px;
            text-align: center;
            border-radius: 12px;
            background: rgba(56, 189, 248, 0.05);
            cursor: pointer;
            transition: 0.3s;
        }

            .upload-zone:hover {
                background: rgba(56, 189, 248, 0.1);
                border-color: #7dd3fc;
            }

        #progress-container {
            margin-top: 30px;
            display: none;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #334155;
            border-radius: 6px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: #38bdf8;
            transition: width 0.1s;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
            display: none;
        }

        .card {
            background: #334155;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #475569;
        }

            .card span {
                display: block;
                font-size: 0.8em;
                color: #94a3b8;
                text-transform: uppercase;
                margin-bottom: 5px;
            }

            .card b {
                font-size: 1.8em;
                color: #f8fafc;
            }

        #debug-log {
            background: #000;
            color: #4ade80;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #334155;
            white-space: pre-wrap;
            word-break: break-all;
        }

        #chart-wrapper {
            margin-top: 30px;
            height: 500px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Analyseur de Données SCORM (Diagnostic)</h1>

        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <p>Sélectionnez votre fichier <b>data.js</b> (750 Mo+)</p>
            <input type="file" id="fileInput" accept=".js,.txt" style="display:none">
            <button style="padding: 10px 20px; border:none; background:#38bdf8; color:#0f172a; border-radius:6px; cursor:pointer; font-weight:bold;">Analyser le fichier</button>
        </div>

        <div id="progress-container">
            <div class="progress-label">
                <span id="status-text">Initialisation...</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <div class="stats-grid" id="stats">
            <div class="card"><span>Sessions</span><b id="val-sessions">0</b></div>
            <div class="card"><span>Apprenants</span><b id="val-users">0</b></div>
            <div class="card"><span>Volume</span><b id="val-size">0 MB</b></div>
        </div>

        <div id="chart-wrapper">
            <canvas id="myChart"></canvas>
        </div>

        <div id="debug-log">> Console prête. Sélectionnez un fichier volumineux.</div>
    </div>

    <script>
const logElement = document.getElementById('debug-log');
const progressFill = document.getElementById('progress-fill');
const statusText = document.getElementById('status-text');
const percentText = document.getElementById('percent-text');

function log(msg, isCritical = false) {
    const time = new Date().toLocaleTimeString([], { hour12: false });
    const color = isCritical ? "#38bdf8" : "#4ade80";
    logElement.innerHTML += `<div style="color:${color}">[${time}] ${msg}</div>`;
    logElement.scrollTop = logElement.scrollHeight;
}

document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    document.getElementById('progress-container').style.display = 'block';
    document.getElementById('stats').style.display = 'none';
    document.getElementById('chart-wrapper').style.display = 'none';

    log(`Ouverture de ${file.name} (${(file.size / (1024*1024)).toFixed(2)} Mo)`);

    const users = {};
    let sessionCount = 0;
    let offset = 0;
    const chunkSize = 1024 * 1024 * 5; // 5 Mo
    const reader = new FileReader();

    // REGEX MULTIPLES : Cherche le nom OU l'ID utilisateur
    const regName = /student_name["']\s*:\s*["']([^"']+)["']/g;
    const regUser = /User["']\s*:\s*["']([^"']+)["']/g;

    const readNext = () => {
        const slice = file.slice(offset, offset + chunkSize);
        reader.readAsText(slice);
    };

    reader.onload = function(event) {
        const text = event.target.result;

        // Diagnostic de la structure sur le premier bloc
        if (offset === 0) {
            log("DIAGNOSTIC - Aperçu du contenu :", true);
            log(text.substring(0, 300) + "...");
        }

        let match;
        // Test Nom complet
        regName.lastIndex = 0;
        while ((match = regName.exec(text)) !== null) {
            const val = match[1].trim();
            if (val && val !== "student_name") {
                users[val] = (users[val] || 0) + 1;
                sessionCount++;
            }
        }

        // Si aucun nom trouvé, on tente via l'ID User
        if (sessionCount === 0) {
            regUser.lastIndex = 0;
            while ((match = regUser.exec(text)) !== null) {
                const val = match[1].trim();
                users[val] = (users[val] || 0) + 1;
                sessionCount++;
            }
        }

        offset += (chunkSize - 1000); // Chevauchement pour sécurité

        const progress = Math.min(100, Math.round((offset / file.size) * 100));
        progressFill.style.width = progress + "%";
        percentText.textContent = progress + "%";
        statusText.textContent = `Traitement : ${sessionCount} sessions...`;

        if (offset < file.size) {
            readNext();
        } else {
            log(`Analyse terminée. Résultat : ${sessionCount} sessions.`);
            if(sessionCount > 0) {
                displayResults(users, sessionCount, file.size);
            } else {
                log("ÉCHEC : Aucune donnée détectée. Vérifiez l'aperçu ci-dessus.", true);
            }
        }
    };

    readNext();
});

function displayResults(users, total, size) {
    document.getElementById('stats').style.display = 'grid';
    document.getElementById('chart-wrapper').style.display = 'block';
    document.getElementById('val-sessions').textContent = total.toLocaleString();
    document.getElementById('val-users').textContent = Object.keys(users).length.toLocaleString();
    document.getElementById('val-size').textContent = (size / (1024*1024)).toFixed(0) + " MB";

    const sortedNames = Object.keys(users)
        .sort((a, b) => users[b] - users[a])
        .slice(0, 20);
    const sortedValues = sortedNames.map(n => users[n]);

    const ctx = document.getElementById('myChart').getContext('2d');
    if (window.chartInstance) window.chartInstance.destroy();

    window.chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: sortedNames,
            datasets: [{
                label: 'Nombre de sessions',
                data: sortedValues,
                backgroundColor: '#38bdf8'
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { ticks: { color: '#94a3b8' } },
                y: { ticks: { color: '#f8fafc' } }
            },
            plugins: { legend: { display: false } }
        }
    });
}
    </script>
</body>
</html>
