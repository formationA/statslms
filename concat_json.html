<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>KPI LMS - Accumulateur de Données</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --text: #0f172a;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-val {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        pre {
            background: #0f172a;
            color: #38bdf8;
            padding: 20px;
            border-radius: 10px;
            height: 400px;
            overflow: auto;
            font-size: 12px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="file"] {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 8px;
            border-radius: 8px;
            flex-grow: 1;
        }

        .error {
            color: #dc2626;
            background: #fee2e2;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>📦 Accumulateur de KPI Trimestriel</h2>
            <p>Sélectionnez tous les fichiers JSON du dossier <strong>/json</strong> pour les cumuler.</p>

            <div id="errorMessage" class="error"></div>

            <div class="controls">
                <input type="file" id="filePicker" multiple accept=".json">
                <button onclick="processSelectedFiles()">Cumuler les fichiers</button>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <small>Fichiers lus</small>
                    <div id="countFiles" class="stat-val">0</div>
                </div>
                <div class="stat-card">
                    <small>Total lignes</small>
                    <div id="countLines" class="stat-val">0</div>
                </div>
                <div class="stat-card">
                    <small>Trimestre</small>
                    <div id="currentQ" class="stat-val">-</div>
                </div>
            </div>

            <h3>Résultat du cumul JSON :</h3>
            <pre id="output">// Sélectionnez des fichiers pour générer le cumul...</pre>

            <button onclick="downloadResult()" style="background:#0f172a; margin-top:10px;">Télécharger le JSON Cumulé</button>
        </div>
    </div>


    <script>
        let finalAccumulatedData = [];

        // Détection auto du trimestre au chargement
        window.onload = () => {
            const q = Math.ceil((new Date().getMonth() + 1) / 3);
            document.getElementById('currentQ').innerText = `T${q}`;
        };

        async function processSelectedFiles() {
            const fileInput = document.getElementById('filePicker');
            const output = document.getElementById('output');
            const err = document.getElementById('errorMessage');

            if (fileInput.files.length === 0) {
                err.innerText = "Erreur : Veuillez sélectionner au moins un fichier JSON.";
                err.style.display = "block";
                return;
            }

            err.style.display = "none";
            finalAccumulatedData = [];
            const files = Array.from(fileInput.files);

            try {
                // Lecture de chaque fichier sélectionné
                for (const file of files) {
                    const text = await file.text();
                    const json = JSON.parse(text);

                    // On ajoute une marque de date basée sur le nom du fichier (ex: kpi_20260308)
                    const dateKey = file.name.replace('kpi_', '').replace('.json', '');

                    const taggedData = json.map(item => ({
                        ...item,
                        cumul_date: dateKey,
                        source_file: file.name
                    }));

                    finalAccumulatedData = finalAccumulatedData.concat(taggedData);
                }

                // Affichage des résultats
                document.getElementById('countFiles').innerText = files.length;
                document.getElementById('countLines').innerText = finalAccumulatedData.length;
                output.innerText = JSON.stringify(finalAccumulatedData, null, 2);

            } catch (e) {
                err.innerText = "Erreur de lecture : " + e.message;
                err.style.display = "block";
            }
        }

        function downloadResult() {
            if (finalAccumulatedData.length === 0) return;
            const blob = new Blob([JSON.stringify(finalAccumulatedData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "kpi_cumul_trimestre.json";
            a.click();
        }
    </script>

</body>
</html>
