<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ | Centre d'Aide LMS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --blue: #38bdf8;
            --green: #10b981;
            --orange: #fb923c;
            --white: #f8fafc;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --card: #ffffff;
            --white: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--white);
            transition: background-color 0.3s;
        }

        .navbar {
            padding: 1rem 2rem;
            background: #1e293b;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #f8fafc;
        }

            .navbar h1 {
                color: #f8fafc !important;
            }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

            header h1 {
                color: var(--blue);
                margin-bottom: 10px;
            }

        .categories {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .cat-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--white);
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

            .cat-btn.active {
                background: var(--blue);
                color: #0f172a;
                border-color: var(--blue);
            }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff !important;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .search-container {
            position: relative;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
        }

            .search-container i.fa-search {
                position: absolute;
                left: 15px;
                color: var(--muted);
            }

        #faqSearch {
            width: 100%;
            padding: 15px 110px 15px 45px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--white);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

            #faqSearch:focus {
                border-color: var(--blue);
                box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
            }

        #clearSearch {
            position: absolute;
            right: 10px;
            background: var(--blue);
            border: none;
            color: #0f172a;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: none;
        }

        .faq-item {
            background: var(--card);
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .faq-question {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            transition: background 0.3s;
            outline: none;
        }

            .faq-question:hover, .faq-question:focus {
                background: rgba(255,255,255,0.05);
            }

        .faq-answer {
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease-out;
            color: var(--muted);
            background: rgba(0,0,0,0.1);
            line-height: 1.6;
        }

        .faq-item.active .faq-answer {
            padding: 20px;
            max-height: 2000px;
            border-top: 1px solid var(--border);
        }

        .faq-item.active .fa-chevron-down {
            transform: rotate(180deg);
        }

        .highlight {
            color: var(--blue);
            font-weight: 600;
        }

        .warning {
            color: var(--orange);
            font-weight: 600;
        }

        .cat-tag {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            background: rgba(255,255,255,0.1);
            margin-right: 10px;
        }

        /* Style pour les tags à l'intérieur des questions */
        .tag-valide, .tag-fictif {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
            font-weight: 600;
            vertical-align: middle;
            text-transform: none; /* Pour garder les minuscules du JSON */
        }

        /* Cas e-mail valide (Vert) */
        .tag-valide {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        /* Cas e-mail fictif (Orange/Ambre) */
        .tag-fictif {
            background: rgba(251, 146, 60, 0.15);
            color: #fb923c;
            border: 1px solid rgba(251, 146, 60, 0.3);
        }

        /* Ajustements pour le mode clair */
        [data-theme="light"] .tag-valide {
            background: #d1fae5;
            color: #065f46;
        }

        [data-theme="light"] .tag-fictif {
            background: #ffedd5;
            color: #9a3412;
        }


        /* Style pour les listes dans les réponses */
        .faq-answer ul {
            padding-left: 25px !important; /* Espace pour les puces standards */
            margin: 15px 0;
        }

        .faq-answer li {
            margin-bottom: 15px; /* Espace entre chaque point de la liste */
            color: var(--muted); /* Couleur de texte plus douce pour l'explication */
        }

            /* Mise en évidence des alertes orange dans la liste */
            .faq-answer li .warning {
                display: inline-block; /* Permet un meilleur positionnement */
                color: var(--orange);
                font-weight: 600;
                margin-bottom: 4px;
            }

        /* Style pour les textes importants en fin de réponse */
        .faq-answer p {
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="display:flex; align-items:center;">
            <a href="../ressources-hub.html" style="color:var(--blue); text-decoration:none; margin-right:20px;"><i class="fas fa-chevron-left"></i> Retour</a>
            <h1 style="font-size: 1.1rem; margin: 0;">FAQ & Support Technique</h1>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="toggleAdmin()" class="theme-toggle" id="adminBtn"><i id="adminIcon" class="fas fa-lock"></i> Admin</button>
            <button id="themeToggle" class="theme-toggle"><i id="themeIcon" class="fas fa-sun"></i> Mode</button>
        </div>
    </nav>

    <div class="container">
        <div id="adminPanel" style="display:none; margin-bottom: 30px; padding: 20px; border: 1px dashed var(--blue); border-radius: 12px; background: rgba(0,0,0,0.2);" data-current-id="">
            <h3 style="color: var(--blue); margin-top: 0;">🛠 Gestion des questions</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="newQuestion" placeholder="Question">
                <select id="newCat">
                    <option value="flux">Flux & Ammon</option>
                    <option value="connexion">Connexion</option>
                    <option value="admin">Administratif</option>
                    <option value="pedagogie">Pédagogie</option>
                </select>
                <textarea id="newAnswer" placeholder="Réponse (Markdown ou HTML)" rows="3"></textarea>
                <div style="display:flex; gap:10px;">
                    <button onclick="addFAQ()" style="flex:2; background: var(--green); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold;">Enregistrer</button>
                    <button onclick="cancelEdit()" id="cancelBtn" style="flex:1; display:none; background: var(--muted); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer;">Annuler</button>
                </div>
            </div>
        </div>

        <header>
            <h1>Comment pouvons-nous vous aider ?</h1>
            <p style="color:var(--muted)">Réponses rapides aux questions sur le flux Ammon et le LMS.</p>
        </header>

        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="faqSearch" placeholder="Rechercher une question...">
            <button id="clearSearch">Tout afficher</button>
        </div>

        <div class="categories">
            <button class="cat-btn active" data-filter="all">Toutes les questions</button>
            <button class="cat-btn" data-filter="flux">Flux & Ammon</button>
            <button class="cat-btn" data-filter="connexion">Connexion</button>
            <button class="cat-btn" data-filter="admin">Administratif</button>
            <button class="cat-btn" data-filter="pedagogie">Pédagogie</button>
        </div>

        <div class="faq-list" id="faqContainer"></div>
    </div>

    <script>
        const JSON_PATH = 'faq.json';
        let faqData = [];
        let isAdminMode = false;
        let editIndex = -1;

        async function loadFAQ() {
            const container = document.getElementById('faqContainer');
            try {
                const response = await fetch(JSON_PATH);
                if (!response.ok) throw new Error('Fichier JSON introuvable');
                faqData = await response.json();
                renderFAQ(faqData);
            } catch (error) {
                container.innerHTML = `<p style="text-align:center; color:var(--orange);">Erreur : Impossible de charger les questions.</p>`;
            }
        }

        function renderFAQ(data) {
            const container = document.getElementById('faqContainer');
            const sortedData = [...data].sort((a, b) => a.id - b.id);

            container.innerHTML = sortedData.map((item, index) => {
                return `
    <div class="faq-item" data-cat="${item.cat}" data-id="${item.id}">
        <div class="faq-question" onclick="this.parentElement.classList.toggle('active')" tabindex="0" onkeydown="handleKey(event, this)">
            <span>
                <span style="color:var(--blue); margin-right:8px; font-size:0.9rem; opacity:0.7;">#${item.id}</span>
                ${item.question}
            </span>
            <div style="display:flex; align-items:center;">
                <i class="fas fa-copy" onclick="event.stopPropagation(); copyFAQ(this)" title="Copier la réponse" style="margin-right:15px; cursor:pointer; opacity:0.6;"></i>
                
                ${isAdminMode ? `
                    <i class="fas fa-edit" onclick="event.stopPropagation(); editFAQ(${index})" title="Modifier" style="color:var(--blue); margin-right:15px; cursor:pointer;"></i>
                    <i class="fas fa-trash" onclick="event.stopPropagation(); deleteFAQ(${index})" title="Supprimer" style="color:var(--orange); margin-right:15px; cursor:pointer;"></i>
                ` : ''}
                <i class="fas fa-chevron-down" style="font-size:0.8rem; color:var(--muted)"></i>
            </div>
        </div>
        <div class="faq-answer">${marked.parse(item.answer)}</div>
    </div>
`;
            }).join('');
        }

        function handleKey(e, element) {
            if (e.key === "Enter" || e.key === " ") {
                e.preventDefault();
                element.parentElement.classList.toggle('active');
            }
        }

        function toggleAdmin() {
            const pass = prompt("Mot de passe admin :");
            if (pass === "1969") {
                isAdminMode = !isAdminMode;
                document.getElementById('adminPanel').style.display = isAdminMode ? 'block' : 'none';
                document.getElementById('adminIcon').className = isAdminMode ? 'fas fa-lock-open' : 'fas fa-lock';
                renderFAQ(faqData);
            } else { alert("Accès refusé"); }
        }

        function editFAQ(index) {
            editIndex = index;
            const item = faqData[index];
            document.getElementById('newQuestion').value = item.question;
            document.getElementById('newAnswer').value = item.answer;
            document.getElementById('newCat').value = item.cat;
            document.getElementById('adminPanel').dataset.currentId = item.id || '';
            document.getElementById('cancelBtn').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editIndex = -1;
            document.getElementById('newQuestion').value = '';
            document.getElementById('newAnswer').value = '';
            document.getElementById('adminPanel').dataset.currentId = "";
            document.getElementById('cancelBtn').style.display = 'none';
        }

        function addFAQ() {
            const q = document.getElementById('newQuestion').value;
            const a = document.getElementById('newAnswer').value;
            const c = document.getElementById('newCat').value;
            const panel = document.getElementById('adminPanel');
            const existingId = panel.dataset.currentId;

            if (q && a) {
                if (existingId && existingId !== "") {
                    faqData[editIndex] = { id: parseInt(existingId), question: q, answer: a, cat: c };
                } else {
                    const maxId = faqData.reduce((max, item) => (item.id > max ? item.id : max), 0);
                    faqData.push({ id: maxId + 1, question: q, answer: a, cat: c });
                }
                cancelEdit();
                saveLocal();
            }
        }

        function deleteFAQ(index) {
            if (confirm("Supprimer cette question ?")) {
                faqData.splice(index, 1);
                saveLocal();
            }
        }

        async function saveLocal() {
            renderFAQ(faqData);
            const tempToken = prompt("GitHub Token :");
            if (!tempToken) return;

            const url = `https://api.github.com/repos/formationA/statslms/contents/faq.json`;
            try {
                const getRes = await fetch(url, { headers: { 'Authorization': `token ${tempToken}` } });
                const fileMetadata = await getRes.json();
                const updateRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${tempToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Mise à jour FAQ",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(faqData, null, 2)))),
                        sha: fileMetadata.sha
                    })
                });
                if (updateRes.ok) alert("✅ Sauvegarde réussie !");
            } catch (e) { alert("❌ Erreur sauvegarde."); }
        }


        async function copyFAQ(btn, index) {
            const item = btn.closest('.faq-item');
            const question = item.querySelector('.faq-question').cloneNode(true);
            const answer = item.querySelector('.faq-answer').cloneNode(true);

            // Nettoyage du clone pour ne garder que le texte et les tags
            const controls = question.querySelector('div[style*="display:flex"]');
            if (controls) controls.remove();

            // Création du bloc HTML à copier
            const container = document.createElement('div');
            container.style.fontFamily = 'Arial, sans-serif';

            // Style de la question pour le copier-coller
            question.style.fontWeight = 'bold';
            question.style.color = '#38bdf8';
            question.style.fontSize = '1.1rem';
            question.style.marginBottom = '10px';
            question.style.display = 'block';

            // Style de la réponse
            answer.style.display = 'block';
            answer.style.maxHeight = 'none';
            answer.style.padding = '10px';
            answer.style.color = '#333';

            container.appendChild(question);
            container.appendChild(answer);

            try {
                const blob = new Blob([container.innerHTML], { type: 'text/html' });
                const text = new Blob([container.innerText], { type: 'text/plain' });
                await navigator.clipboard.write([
                    new ClipboardItem({ 'text/html': blob, 'text/plain': text })
                ]);

                // Petit feedback visuel sur le bouton
                const icon = btn.querySelector('i');
                icon.className = 'fas fa-check';
                btn.style.color = 'var(--green)';
                setTimeout(() => {
                    icon.className = 'fas fa-copy';
                    btn.style.color = '';
                }, 2000);
            } catch (err) {
                alert("Erreur lors de la copie");
            }
        }


        const searchInput = document.getElementById('faqSearch');
        const clearBtn = document.getElementById('clearSearch');

        function filterFAQ() {
            const searchText = searchInput.value.toLowerCase();
            const activeCat = document.querySelector('.cat-btn.active').dataset.filter;
            const items = document.querySelectorAll('.faq-item');
            clearBtn.style.display = searchText.length > 0 ? 'block' : 'none';

            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                const matchesSearch = text.includes(searchText);
                const matchesCat = (activeCat === 'all' || item.dataset.cat === activeCat);
                item.style.display = (matchesSearch && matchesCat) ? "block" : "none";
            });
        }

        searchInput.oninput = filterFAQ;
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelector('.cat-btn.active').classList.remove('active');
                btn.classList.add('active');
                filterFAQ();
            };
        });

        clearBtn.onclick = () => { searchInput.value = ''; filterFAQ(); };

        document.getElementById('themeToggle').onclick = () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeIcon').className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        };

        loadFAQ();
    </script>
</body>
</html>
