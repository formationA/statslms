<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ | Support Technique Premium</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --blue: #38bdf8;
            --green: #10b981;
            --orange: #fb923c;
            --purple: #a78bfa;
            --white: #f8fafc;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --glass: blur(12px);
        }

        [data-theme="light"] {
            --bg: #f1f5f9;
            --card: rgba(255, 255, 255, 0.8);
            --white: #1e293b;
            --muted: #64748b;
            --border: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, var(--bg));
            background-attachment: fixed;
            color: var(--white);
            transition: all 0.3s;
        }

        /* --- Navbar & Layout --- */
        .navbar {
            padding: 1rem 2rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: var(--glass);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* --- Admin Panel & Legend --- */
        #adminPanel {
            background: var(--card);
            backdrop-filter: var(--glass);
            border: 2px solid var(--blue);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .markdown-legend {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.85rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            border: 1px solid var(--border);
        }

        .legend-item code {
            color: var(--blue);
        }

        /* --- FAQ Items Styling --- */
        .faq-item {
            background: var(--card);
            backdrop-filter: var(--glass);
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 5px solid var(--muted);
        }

            /* Couleurs par catégorie */
            .faq-item[data-cat="flux"] {
                border-left-color: var(--blue);
            }

            .faq-item[data-cat="connexion"] {
                border-left-color: var(--green);
            }

            .faq-item[data-cat="admin"] {
                border-left-color: var(--orange);
            }

            .faq-item[data-cat="pedagogie"] {
                border-left-color: var(--purple);
            }

            .faq-item:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            }

        .faq-question {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .faq-answer {
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0,0,0,0.05);
        }

        .faq-item.active .faq-answer {
            padding: 20px;
            max-height: 1000px;
            border-top: 1px solid var(--border);
        }

        /* --- Components --- */
        .cat-btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--white);
            cursor: pointer;
            transition: 0.3s;
        }

            .cat-btn.active {
                background: var(--blue);
                color: var(--bg);
                font-weight: bold;
            }

        input, textarea, select {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Style Markdown à l'intérieur */
        .faq-answer table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }

        .faq-answer th, .faq-answer td {
            border: 1px solid var(--border);
            padding: 8px;
            text-align: left;
        }

        .faq-answer blockquote {
            border-left: 4px solid var(--blue);
            padding-left: 15px;
            margin-left: 0;
            color: var(--muted);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="display:flex; align-items:center;">
            <h1 style="font-size: 1.2rem; margin: 0;"><i class="fas fa-headset" style="margin-right:10px;"></i> Support Client v3</h1>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="toggleAdmin()" class="cat-btn" id="adminBtn"><i id="adminIcon" class="fas fa-lock"></i></button>
            <button id="themeToggle" class="cat-btn"><i id="themeIcon" class="fas fa-sun"></i></button>
        </div>
    </nav>

    <div class="container">
        <div id="adminPanel" style="display:none;">
            <h3 style="margin-top:0"><i class="fas fa-edit"></i> Éditeur de Contenu</h3>
            <div style="display: grid; gap: 15px;">
                <input type="text" id="newQuestion" placeholder="La question...">
                <div style="display: flex; gap: 10px;">
                    <select id="newCat" style="flex: 1;">
                        <option value="flux">Flux & Ammon</option>
                        <option value="connexion">Connexion</option>
                        <option value="admin">Administratif</option>
                        <option value="pedagogie">Pédagogie</option>
                    </select>
                    <input type="number" id="manualId" placeholder="ID (optionnel)" style="flex: 0.3;">
                </div>
                <textarea id="newAnswer" placeholder="Réponse en Markdown..." rows="5"></textarea>

                <div style="display:flex; gap:10px;">
                    <button onclick="addFAQ()" style="flex:2; background: var(--green); border:none; padding:12px; border-radius:8px; cursor:pointer; color:white; font-weight:bold;">PUBLIER</button>
                    <button onclick="cancelEdit()" id="cancelBtn" style="display:none; flex:1; background:var(--orange); border:none; border-radius:8px; color:white; cursor:pointer;">ANNULER</button>
                </div>
            </div>

            <div class="markdown-legend">
                <div class="legend-item"><code>**Gras**</code> → <strong>Gras</strong></div>
                <div class="legend-item"><code>[fa:user]</code> → <i class="fas fa-user"></i> (Icône)</div>
                <div class="legend-item"><code>> Texte</code> → Citation</div>
                <div class="legend-item"><code>---</code> → Ligne de séparation</div>
                <div class="legend-item"><code>< span class="highlight"></code> → Couleur</div>
            </div>
        </div>

        <header style="text-align:center; margin-bottom: 50px;">
            <h2 style="font-size: 2.5rem; margin-bottom: 10px;">Comment pouvons-nous vous aider ?</h2>
            <div class="search-container" style="position:relative; max-width:600px; margin: 0 auto;">
                <i class="fas fa-search" style="position:absolute; left:20px; top:18px; color:var(--muted)"></i>
                <input type="text" id="faqSearch" placeholder="Rechercher un mot-clé (ex: mot de passe, flux...)" style="padding-left:50px; border-radius:50px; height:55px; font-size:1.1rem; background:var(--card);">
            </div>
        </header>

        <div class="categories" id="catFilters">
            <button class="cat-btn active" data-filter="all">Tout</button>
            <button class="cat-btn" data-filter="flux"><i class="fas fa-sync"></i> Flux</button>
            <button class="cat-btn" data-filter="connexion"><i class="fas fa-key"></i> Connexion</button>
            <button class="cat-btn" data-filter="admin"><i class="fas fa-file-invoice"></i> Admin</button>
            <button class="cat-btn" data-filter="pedagogie"><i class="fas fa-graduation-cap"></i> Pédagogie</button>
        </div>

        <div id="faqContainer"></div>
    </div>

    <script>
        // Configuration de Marked pour supporter les icônes personnalisées [fa:icon]
        const renderer = new marked.Renderer();
        const originalTextRenderer = renderer.text.bind(renderer);
        renderer.text = (text) => {
            return text.replace(/\[fa:([a-z0-9-]+)\]/g, '<i class="fas fa-$1"></i>');
        };
        marked.setOptions({ renderer: renderer, breaks: true });

        const JSON_PATH = 'faq.json';
        let faqData = [];
        let isAdminMode = false;

        async function loadFAQ() {
            try {
                const response = await fetch(JSON_PATH);
                faqData = await response.json();
                renderFAQ(faqData);
            } catch (e) {
                document.getElementById('faqContainer').innerHTML = "<p>Erreur de chargement JSON.</p>";
            }
        }

        function getCatIcon(cat) {
            const icons = {
                'flux': 'fa-sync',
                'connexion': 'fa-key',
                'admin': 'fa-file-invoice',
                'pedagogie': 'fa-graduation-cap'
            };
            return icons[cat] || 'fa-question-circle';
        }

        function renderFAQ(data) {
            const container = document.getElementById('faqContainer');
            container.innerHTML = data.map((item, index) => `
                    <div class="faq-item" data-cat="${item.cat}">
                        <div class="faq-question" onclick="this.parentElement.classList.toggle('active')">
                            <span>
                                <i class="fas ${getCatIcon(item.cat)}" style="margin-right:15px; opacity:0.5; width:20px"></i>
                                <span style="opacity:0.5; font-size:0.8rem; margin-right:5px">#${item.id}</span>
                                ${item.question}
                            </span>
                            <div style="display:flex; gap:15px; align-items:center;">
                                ${isAdminMode ? `<i class="fas fa-edit" onclick="event.stopPropagation(); editFAQ(${index})" style="color:var(--blue)"></i>` : ''}
                                ${isAdminMode ? `<i class="fas fa-trash" onclick="event.stopPropagation(); deleteFAQ(${index})" style="color:var(--orange)"></i>` : ''}
                                <i class="fas fa-chevron-down" style="font-size:0.8rem; opacity:0.5"></i>
                            </div>
                        </div>
                        <div class="faq-answer">${marked.parse(item.answer)}</div>
                    </div>
                `).join('');
        }

        // --- FONCTIONS ADMIN ---
        function toggleAdmin() {
            if (prompt("Code Admin :") === "1969") {
                isAdminMode = !isAdminMode;
                document.getElementById('adminPanel').style.display = isAdminMode ? 'block' : 'none';
                document.getElementById('adminIcon').className = isAdminMode ? 'fas fa-lock-open' : 'fas fa-lock';
                renderFAQ(faqData);
            }
        }

        let editIndex = -1;
        function editFAQ(index) {
            editIndex = index;
            const item = faqData[index];
            document.getElementById('newQuestion').value = item.question;
            document.getElementById('newAnswer').value = item.answer;
            document.getElementById('newCat').value = item.cat;
            document.getElementById('manualId').value = item.id;
            document.getElementById('cancelBtn').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editIndex = -1;
            document.getElementById('newQuestion').value = '';
            document.getElementById('newAnswer').value = '';
            document.getElementById('manualId').value = '';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        function addFAQ() {
            const q = document.getElementById('newQuestion').value;
            const a = document.getElementById('newAnswer').value;
            const c = document.getElementById('newCat').value;
            const mId = document.getElementById('manualId').value;

            if (!q || !a) return alert("Remplissez tout !");

            const newItem = {
                id: mId ? parseInt(mId) : (faqData.length > 0 ? Math.max(...faqData.map(i => i.id)) + 1 : 1),
                cat: c,
                question: q,
                answer: a
            };

            if (editIndex > -1) faqData[editIndex] = newItem;
            else faqData.push(newItem);

            faqData.sort((x, y) => x.id - y.id);
            saveToGithub();
            cancelEdit();
        }

        function deleteFAQ(index) {
            if (confirm("Supprimer ?")) {
                faqData.splice(index, 1);
                saveToGithub();
            }
        }

        async function saveToGithub() {
            renderFAQ(faqData);
            const token = prompt("GitHub Token :");
            if (!token) return;

            const url = `https://api.github.com/repos/formationA/statslms/contents/faq.json`;
            const get = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            const meta = await get.json();

            const put = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Update FAQ",
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(faqData, null, 2)))),
                    sha: meta.sha
                })
            });
            if (put.ok) alert("Sauvegardé !");
        }

        // --- FILTRES & RECHERCHE ---
        document.getElementById('faqSearch').oninput = function () {
            const val = this.value.toLowerCase();
            const filtered = faqData.filter(i => i.question.toLowerCase().includes(val) || i.answer.toLowerCase().includes(val));
            renderFAQ(filtered);
        };

        document.querySelectorAll('.cat-btn[data-filter]').forEach(btn => {
            btn.onclick = () => {
                document.querySelector('.cat-btn.active').classList.remove('active');
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                renderFAQ(filter === 'all' ? faqData : faqData.filter(i => i.cat === filter));
            };
        });

        document.getElementById('themeToggle').onclick = () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-moon' : 'fas fa-sun';
        };

        loadFAQ();
    </script>
</body>
</html>
