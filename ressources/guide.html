<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guides & Tutos | LMS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --blue: #38bdf8;
            --green: #10b981;
            --white: #f8fafc;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --card: #ffffff;
            --white: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--white);
            transition: 0.3s;
        }

        .navbar {
            padding: 1rem 2rem;
            background: #1e293b;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

            header h1 {
                color: var(--blue);
            }

        /* Grille de tutoriels */
        .tuto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .tuto-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

            .tuto-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 20px rgba(0,0,0,0.2);
                border-color: var(--blue);
            }

        .tuto-icon {
            font-size: 2rem;
            color: var(--blue);
            margin-bottom: 15px;
        }

        .tuto-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .tuto-desc {
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn-launch {
            background: var(--blue);
            color: #0f172a;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
        }

            .btn-launch:hover {
                opacity: 0.9;
            }

        .tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            background: rgba(56, 189, 248, 0.1);
            color: var(--blue);
            padding: 4px 8px;
            border-radius: 4px;
            width: fit-content;
            margin-bottom: 10px;
        }

        /* Styles de la Modale */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 900px;
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 35px;
            cursor: pointer;
        }

        .video-container {
            padding-top: 56.25%;
            position: relative;
        }

            .video-container iframe {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                border: 0;
                border-radius: 8px;
            }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="display:flex; align-items:center;">
            <a href="../ressources-hub.html" style="color:var(--blue); text-decoration:none; margin-right:20px;"><i class="fas fa-chevron-left"></i> Retour</a>
            <h1 style="font-size: 1.1rem; margin: 0; color: #f8fafc;">Espace Tutoriels</h1>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>Guides d'utilisation</h1>
            <p style="color:var(--muted)">Sélectionnez un guide pour apprendre à maîtriser le LMS.</p>
        </header>

        <div class="tuto-grid" id="tutoContainer">
            <p style="text-align: center; grid-column: 1/-1;">Chargement des tutoriels...</p>
        </div>
    </div>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="video-container">
                <iframe id="videoFrame" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        async function loadTutos() {
            const container = document.getElementById('tutoContainer');

            try {
                const response = await fetch('tutos.json');
                if (!response.ok) throw new Error('Erreur lors du chargement du JSON');

                const tutos = await response.json();
                container.innerHTML = '';

                tutos.forEach(tuto => {
                    const card = `
                            <div class="tuto-card">
                                <div>
                                    <div class="tag">${tuto.tag}</div>
                                    <i class="${tuto.icon} tuto-icon"></i>
                                    <div class="tuto-title">${tuto.title}</div>
                                    <div class="tuto-desc">${tuto.desc}</div>
                                </div>
                                <button onclick="openModal('${tuto.url}')" class="btn-launch">
                                    Lancer le tuto <i class="fas fa-play-circle"></i>
                                </button>
                            </div>
                        `;
                    container.innerHTML += card;
                });

            } catch (error) {
                console.error('Erreur:', error);
                container.innerHTML = `<p style="text-align:center; color:#f97316;">Erreur : Impossible de charger les tutos.</p>`;
            }
        }

        // Fonctions pour gérer la modale
        function openModal(url) {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('videoFrame');
            iframe.src = url;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Bloque le scroll derrière
        }

        function closeModal() {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('videoFrame');
            iframe.src = ''; // Arrête la vidéo
            modal.style.display = 'none';
            document.body.style.overflow = 'auto'; // Réactive le scroll
        }

        // Fermeture au clic à l'extérieur de la vidéo
        window.onclick = function (event) {
            const modal = document.getElementById('videoModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        window.onload = loadTutos;
    </script>

</body>
</html>
