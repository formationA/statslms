<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guides & Tutos | LMS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --blue: #38bdf8;
            --green: #10b981;
            --white: #f8fafc;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --card: #ffffff;
            --white: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--white);
            transition: 0.3s;
        }

        .navbar {
            padding: 1rem 2rem;
            background: #1e293b;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

            header h1 {
                color: var(--blue);
            }

        .tuto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .tuto-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

            .tuto-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 20px rgba(0,0,0,0.2);
                border-color: var(--blue);
            }

        .tuto-icon {
            font-size: 2rem;
            color: var(--blue);
            margin-bottom: 15px;
        }

        .tuto-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .tuto-desc {
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn-launch {
            background: var(--blue);
            color: #0f172a;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
        }

            .btn-launch:hover {
                opacity: 0.9;
            }

        .tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            background: rgba(56, 189, 248, 0.1);
            color: var(--blue);
            padding: 4px 8px;
            border-radius: 4px;
            width: fit-content;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="display:flex; align-items:center;">
            <a href="../ressources-hub.html" style="color:var(--blue); text-decoration:none; margin-right:20px;"><i class="fas fa-chevron-left"></i> Retour</a>
            <h1 style="font-size: 1.1rem; margin: 0; color: #f8fafc;">Espace Tutoriels</h1>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>Guides d'utilisation</h1>
            <p style="color:var(--muted)">Sélectionnez un guide pour apprendre à maîtriser le LMS.</p>
        </header>

        <div class="tuto-grid" id="tutoContainer">
            <p style="text-align: center; grid-column: 1/-1;">Chargement des tutoriels...</p>
        </div>
    </div>

    <script>
        async function loadTutos() {
            const container = document.getElementById('tutoContainer');

            try {
                const response = await fetch('tutos.json');
                if (!response.ok) throw new Error('Erreur lors du chargement du JSON');

                const tutos = await response.json();
                container.innerHTML = '';

                tutos.forEach(tuto => {
                    const card = `
                            <div class="tuto-card">
                                <div>
                                    <div class="tag">${tuto.tag}</div>
                                    <i class="${tuto.icon} tuto-icon"></i>
                                    <div class="tuto-title">${tuto.title}</div>
                                    <div class="tuto-desc">${tuto.desc}</div>
                                </div>
                                <button onclick="launchVideo('${tuto.url}')" class="btn-launch">
                                    Voir le tutoriel <i class="fas fa-external-link-alt"></i>
                                </button>
                            </div>
                        `;
                    container.innerHTML += card;
                });

            } catch (error) {
                console.error('Erreur:', error);
                container.innerHTML = `<p style="text-align:center; color:var(--muted);">Erreur : Impossible de charger les tutos.</p>`;
            }
        }

        // Fonction pour ouvrir une fenêtre surgissante propre
        function launchVideo(url) {
            const w = 1100;
            const h = 750;
            const left = (screen.width / 2) - (w / 2);
            const top = (screen.height / 2) - (h / 2);

            window.open(url, 'LMS_Tuto', `width=${w}, height=${h}, top=${top}, left=${left}, scrollbars=yes, resizable=yes`);
        }

        window.onload = loadTutos;
    </script>

</body>
</html>
