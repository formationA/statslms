<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap & Évolutions | LMS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --blue: #38bdf8;
            --success: #22c55e;
            --transition: all 0.3s ease;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Navbar --- */
        .navbar {
            width: 100%;
            display: flex;
            align-items: center;
            padding: 15px 30px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            box-sizing: border-box;
        }

        .container {
            width: 95%;
            max-width: 1600px; /* Largeur augmentée */
            padding: 40px 20px;
            box-sizing: border-box; /* Assure que le padding n'augmente pas la taille */
        }

        /* Barre de recherche */
        .search-container {
            position: relative;
            margin-bottom: 30px;
            width: 100%; /* S'aligne sur le container */
        }

        #searchInput {
            width: 100%;
            padding: 14px 20px 14px 50px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
            box-sizing: border-box;
        }

            #searchInput:focus {
                border-color: var(--blue);
                box-shadow: 0 0 15px rgba(56, 189, 248, 0.15);
            }

        .search-container i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }

        /* Tableau */
        .table-wrapper {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            width: 100%; /* S'aligne sur le container */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--blue);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            line-height: 1.4;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge-ui {
            background: rgba(56, 189, 248, 0.1);
            color: var(--blue);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .date-col {
            font-family: monospace;
            color: var(--text-dim);
        }

        .prod-ready {
            color: var(--success);
            font-weight: 600;
        }

        /* --- Admin UI --- */
        .admin-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-admin {
            background: transparent;
            border: 1px solid var(--blue);
            color: var(--blue);
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            display: none;
        }

            .btn-admin:hover {
                background: var(--blue);
                color: var(--bg-color);
            }

        .btn-save {
            background: var(--success);
            border: none;
            color: white;
        }

        [contenteditable="true"] {
            background: rgba(56, 189, 248, 0.05);
            outline: 1px dashed var(--blue);
            padding: 2px 5px;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .hide-mobile {
                display: none;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="display: flex; align-items: center; flex: 1;">
            <a href="../ressources-hub.html" style="color:var(--blue); text-decoration:none; margin-right:20px;">
                <i class="fas fa-chevron-left"></i> Retour
            </a>
            <h1 style="font-size: 1.1rem; margin: 0;">Roadmap & Évolutions</h1>
            <i id="adminShield" class="fas fa-shield-alt" onclick="toggleAdminMode()"
               style="margin-left: 15px; cursor: pointer; color: var(--text-dim); font-size: 0.9rem; transition: var(--transition);"
               title="Mode Admin">
            </i>
        </div>
    </nav>

    <div class="container">
        <div class="admin-controls">
            <button id="addBtn" class="btn-admin" onclick="addNewRow()">
                <i class="fas fa-plus"></i> Ajouter une ligne
            </button>
            <button id="saveBtn" class="btn-admin btn-save" onclick="saveChanges()">
                <i class="fas fa-save"></i> Enregistrer les modifications
            </button>
        </div>

        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Filtrer par fonctionnalité, interface ou date..." onkeyup="filterData()">
        </div>

        <div class="table-wrapper">
            <table id="roadmapTable">
                <thead>
                    <tr>
                        <th>Interface</th>
                        <th>Modification / Évolution</th>
                        <th class="hide-mobile">Pre-Prod</th>
                        <th>Production</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let allData = [];
        let isAdmin = false;

        async function fetchRoadmap() {
            const tbody = document.getElementById('tableBody');
            try {
                const response = await fetch('roadmap-data.json');
                allData = await response.json();

                // TRI : On place les dates les plus récentes en haut
                allData.sort((a, b) => {
                    // On transforme les chaînes "JJ/MM/AAAA" en objets Date pour comparer
                    const dateA = new Date(a.prod.split('/').reverse().join('-'));
                    const dateB = new Date(b.prod.split('/').reverse().join('-'));
                    return dateB - dateA; // Ordre décroissant
                });

                renderTable(allData);
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="4" ...>Erreur de chargement.</td></tr>`;
            }
        }

        function renderTable(dataArray) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            dataArray.forEach((item, index) => {
                const row = `
            <tr data-index="${index}">
                <td><span class="badge-ui" contenteditable="${isAdmin}">${item.ui}</span></td>
                <td contenteditable="${isAdmin}">${item.task}</td>
                <td class="date-col hide-mobile" contenteditable="${isAdmin}">${item.preprod}</td>
                <td class="date-col prod-ready" contenteditable="${isAdmin}">${item.prod}</td>
            </tr>`;
                tbody.innerHTML += row;
            });
        }

        function toggleAdminMode() {
            const shield = document.getElementById('adminShield');
            if (!isAdmin) {
                const pass = prompt("Entrez le mot de passe administrateur :");
                if (pass === "1969") {
                    isAdmin = true;
                    shield.style.color = "var(--blue)";
                    shield.classList.replace('fa-shield-alt', 'fa-user-shield');
                    document.getElementById('saveBtn').style.display = 'block';
                    document.getElementById('addBtn').style.display = 'block';
                    renderTable(allData);
                } else {
                    alert("Accès refusé");
                }
            } else {
                isAdmin = false;
                shield.style.color = "var(--text-dim)";
                shield.classList.replace('fa-user-shield', 'fa-shield-alt');
                document.getElementById('saveBtn').style.display = 'none';
                document.getElementById('addBtn').style.display = 'none';
                renderTable(allData);
            }
        }

        function addNewRow() {
            const newEntry = {
                "ui": "Nouveau",
                "task": "Détails de l'évolution",
                "preprod": "À définir",
                "prod": "En cours"
            };
            allData.push(newEntry);
            renderTable(allData);
        }

        async function saveChanges() {
            const rows = document.querySelectorAll('#tableBody tr');
            const updatedData = [];

            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                updatedData.push({ // .push garde l'ordre visuel (récent en premier)
                    ui: cells[0].innerText.trim(),
                    task: cells[1].innerText.trim(),
                    preprod: cells[2].innerText.trim(),
                    prod: cells[3].innerText.trim()
                });
            });

            try {
                const response = await fetch('save.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData, null, 2)
                });
                if (response.ok) {
                    alert("✅ Enregistré sur le serveur !");
                    allData = updatedData;
                } else {
                    alert("❌ Erreur serveur.");
                }
            } catch (error) {
                alert("Impossible de joindre save.php");
            }
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allData.filter(item =>
                item.task.toLowerCase().includes(query) ||
                item.ui.toLowerCase().includes(query)
            );
            renderTable(filtered);
        }

        window.onload = fetchRoadmap;
    </script>
</body>
</html>
