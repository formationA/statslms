<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conception LMS - statsLMS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 0; /* Ajusté pour la barre de nav */
        }

        /* Barre de navigation sombre */
        .nav-top {
            padding: 10px 20px;
            background: #2c3e50;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

            .nav-top a {
                color: white;
                text-decoration: none;
                font-weight: bold;
                border: 1px solid white;
                padding: 5px 15px;
                border-radius: 5px;
                font-size: 0.8em;
            }

        .dashboard-container {
            max-width: 1100px;
            margin: 20px auto; /* Ajout d'une marge pour décoller de la barre */
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .stat-badge {
            background: #34495e;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            min-width: 120px;
            text-align: center;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            flex: 1;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .chart-box {
            height: 400px;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.85em;
        }

        th {
            background: #f8f9fa;
            text-align: left;
            padding: 10px;
            position: sticky;
            top: 0;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #eee;
        }

        .scroll-area {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 10px;
        }

        /* Restauré : Style des liens bleus */
        a {
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="nav-top">
        <a href="index.html">⬅️ Retour au Tableau de bord</a>
    </div>

    <div class="dashboard-container">
        <div class="header">
            <div>
                <h1>📦 Dashboard Conception</h1>
                <small style="color: #7f8c8d;">Analyse des programmes et ressources</small>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div class="stat-badge" id="countProg" style="background: #2980b9;">-- Programmes</div>
                <div class="stat-badge" id="countRes" style="background: #27ae60;">-- Ressources</div>
            </div>
        </div>

        <div class="filter-bar">
            <label>🔍 Rechercher :</label>
            <input type="text" id="searchInput" placeholder="Nom du programme, code ressource, format...">
        </div>

        <div class="grid-layout">
            <div class="chart-box">
                <h3 style="margin-top:0">Top 10 : Programmes les plus denses</h3>
                <canvas id="progChart"></canvas>
            </div>

            <div class="scroll-area">
                <table>
                    <thead>
                        <tr>
                            <th>Code / Type</th>
                            <th>Nom de la ressource</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="resTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allRes = [];
        let allProg = [];

        async function init() {
            try {
                const [progData, resData] = await Promise.all([
                    fetch('liste_des_programmes.json?v=' + Date.now()).then(r => r.json()),
                    fetch('liste_des_ressources.json?v=' + Date.now()).then(r => r.json())
                ]);

                allProg = progData;
                allRes = resData;

                document.getElementById('countProg').innerText = `${allProg.length} Programmes`;
                document.getElementById('countRes').innerText = `${allRes.length} Ressources`;

                renderChart();
                renderTable(allRes);

            } catch (e) {
                console.error("Erreur de chargement des fichiers JSON", e);
            }
        }

        function renderChart() {
            const ctx = document.getElementById('progChart').getContext('2d');
            const topProg = [...allProg]
                .sort((a, b) => (parseInt(b["nb de ressources"]) || 0) - (parseInt(a["nb de ressources"]) || 0))
                .slice(0, 10);

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: topProg.map(p => p.Name.substring(0, 25) + '...'),
                    datasets: [{
                        label: 'Nombre de ressources',
                        data: topProg.map(p => parseInt(p["nb de ressources"]) || 0),
                        backgroundColor: '#3498db'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('resTableBody');
            // Restauré : Structure exacte du tr avec les 3 td
            tbody.innerHTML = data.map(r => `
                    <tr>
                        <td><small>${r.Code || ''}</small><br><b>${r.Format ? r.Format.replace('RESOURCE_TYPE_', '') : ''}</b></td>
                        <td>${r.Name}</td>
                        <td></td>
                    </tr>
                `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allRes.filter(r =>
                r.Name.toLowerCase().includes(term) ||
                (r.Code && r.Code.toLowerCase().includes(term)) ||
                (r.Format && r.Format.toLowerCase().includes(term))
            );
            renderTable(filtered);
        });

        init();
    </script>
</body>
</html>
