<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant Pédagogique - IT Pedagogie</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* --- COULEURS ISSUES DE VOTRE STYLE --- */
            --aftral-blue: #2d3663;
            --accent: #5c6eb1;
            --blue: #38bdf8;
            --accent-hover: #7dd3fc;
            --bg-light: #f1f5f9;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            /* --- ADAPTATION MODE CLAIR / SOMBRE --- */
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --blue-light: #e0f2fe;
            --input-bg: #ffffff;
            --border-color: #e2e8f0;
            --nav-bg: rgba(30, 41, 59, 0.95);
        }

        .dark-mode {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --blue-light: rgba(56, 189, 248, 0.1);
            --input-bg: #0f172a;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: var(--transition);
            min-height: 100vh;
        }

        /* --- NAVBAR (Identique à votre code) --- */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
            position: sticky;
            top: 0;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-back-link {
            color: var(--blue);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            font-size: 0.9rem;
        }

            .nav-back-link:hover {
                color: var(--accent-hover);
            }

        .nav-brand-title {
            font-size: 1.1rem;
            margin: 0;
            color: white;
            border-left: 1px solid rgba(255,255,255,0.2);
            padding-left: 20px;
        }

        .nav-brand-subtitle {
            color: var(--blue);
            font-weight: normal;
            margin-left: 10px;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .theme-toggle {
            cursor: pointer;
            color: var(--blue);
            font-size: 1.2rem;
            transition: var(--transition);
        }

        /* --- STRUCTURE DU CONTENU --- */
        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 25px;
        }

        .tool-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        h2 {
            color: var(--aftral-blue);
            font-size: 1rem;
            text-transform: uppercase;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 8px;
            margin: 0 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Harmonisation avec vos inputs */
        .group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            background: var(--input-bg);
            color: var(--text-main);
            outline: none;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            background: var(--aftral-blue);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transition);
            text-transform: uppercase;
            font-size: 0.85rem;
        }

            .btn-action:hover {
                background: var(--accent);
            }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: var(--blue-light);
            border-left: 4px solid var(--blue);
            border-radius: 4px;
            font-style: italic;
            display: none;
        }

        .summary-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            border: 2px dashed var(--accent);
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }

            .summary-card {
                position: static;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="../outils-hub.html" class="nav-back-link">
                <i class="fas fa-chevron-left"></i> Retour
            </a>
            <h1 class="nav-brand-title">
                IT PÉDAGOGIE <span class="nav-brand-subtitle">Assistant Pédagogique</span>
            </h1>
        </div>
        <div class="theme-toggle" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></div>
    </nav>

    <div class="container">
        <div class="tools-column">
            <section class="tool-section">
                <h2><i class="fas fa-bullseye"></i> Objectifs pédagogiques</h2>
                <div class="grid-2">
                    <div class="group">
                        <label>Niveau taxonomique</label>
                        <select id="bloomLevel">
                            <option value="identifier">Mémoriser</option>
                            <option value="expliquer">Comprendre</option>
                            <option value="appliquer" selected>Appliquer</option>
                            <option value="analyser">Analyser</option>
                        </select>
                    </div>
                    <div class="group">
                        <label>Modalité de formation</label>
                        <select id="modality">
                            <option value="E-learning">Distanciel (E-learning)</option>
                            <option value="Présentiel">Présentiel</option>
                            <option value="Hybride">Hybride</option>
                        </select>
                    </div>
                </div>
                <div class="group">
                    <label>Sujet ou compétence visée</label>
                    <input type="text" id="subject" placeholder="ex: utiliser le logiciel de gestion">
                </div>
                <button class="btn-action" onclick="generateObjective()">Générer l'objectif</button>
                <div id="resObjective" class="result-box"></div>
            </section>

            <section class="tool-section">
                <h2><i class="fas fa-clock"></i> Estimation de la durée</h2>
                <div class="grid-2">
                    <div class="group">
                        <label>Nombre de diapositives</label>
                        <input type="number" id="nbSlides" value="0">
                    </div>
                    <div class="group">
                        <label>Nombre de questions (Quiz)</label>
                        <input type="number" id="nbQuiz" value="0">
                    </div>
                </div>
                <button class="btn-action" onclick="calculateTotal()">Calculer le temps estimé</button>
                <div id="resTime" class="result-box"></div>
            </section>

            <section class="tool-section">
                <h2><i class="fas fa-wand-magic-sparkles"></i> Simplification Micro-learning</h2>
                <div class="group">
                    <label>Texte complexe à reformuler</label>
                    <textarea id="rawText" rows="4" placeholder="Copiez votre contenu ici..."></textarea>
                </div>
                <button class="btn-action" onclick="simplifyText()">Générer les points clés</button>
                <div id="resSimplify" class="result-box"></div>
            </section>
        </div>

        <div class="summary-side">
            <div class="summary-card">
                <h2 style="border:none; font-size: 0.9rem; margin-bottom:15px;"><i class="fas fa-file-alt"></i> RÉSUMÉ DU PROJET</h2>
                <div id="summaryContent" style="font-size: 0.85rem; line-height: 1.6;">
                    <p><strong>Objectif :</strong> <span id="sObj">Non défini</span></p>
                    <p><strong>Modalité :</strong> <span id="sMod">-</span></p>
                    <p><strong>Durée :</strong> <span id="sTime">0 min</span></p>
                </div>
                <button class="btn-action" style="margin-top:20px; background: var(--blue);" onclick="copySummary()">COPIER LE RÉSUMÉ</button>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }

        function generateObjective() {
            const verb = document.getElementById('bloomLevel').value;
            const sub = document.getElementById('subject').value || "...";
            const mod = document.getElementById('modality').value;
            const res = `À l'issue de ce module (${mod}), l'apprenant sera capable de **${verb}** ${sub}.`;
            document.getElementById('resObjective').innerHTML = res;
            document.getElementById('resObjective').style.display = 'block';
            document.getElementById('sObj').innerText = res;
            document.getElementById('sMod').innerText = mod;
        }

        function calculateTotal() {
            const slidesTime = document.getElementById('nbSlides').value * 2;
            const quizTime = document.getElementById('nbQuiz').value * 1.5;
            const total = Math.ceil(slidesTime + quizTime);
            document.getElementById('resTime').innerHTML = `Durée de consultation estimée : **${total} minutes**.`;
            document.getElementById('resTime').style.display = 'block';
            document.getElementById('sTime').innerText = total + " min";
        }

        function simplifyText() {
            const txt = document.getElementById('rawText').value;
            if (!txt) return;
            const points = txt.split('.').filter(p => p.trim().length > 5);
            const res = points.slice(0, 3).map(p => `• ${p.trim()}`).join('<br>');
            document.getElementById('resSimplify').innerHTML = res;
            document.getElementById('resSimplify').style.display = 'block';
        }

        function copySummary() {
            const obj = document.getElementById('sObj').innerText;
            const time = document.getElementById('sTime').innerText;
            const mod = document.getElementById('sMod').innerText;
            const text = `PROJET PÉDAGOGIQUE\nObjectif : ${obj}\nModalité : ${mod}\nDurée estimée : ${time}`;
            navigator.clipboard.writeText(text);
            alert("Résumé copié dans le presse-papier !");
        }
    </script>
</body>
</html>
