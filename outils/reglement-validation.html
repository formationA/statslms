<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Règlement Intérieur - AFTRAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --nav-bg: #0f172a;
            --blue: #38bdf8;
            --text-nav: #f8fafc;
            --doc-bg: #ffffff;
            --doc-text: #1e293b;
            --doc-dim: #64748b;
            --doc-border: #e2e8f0;
            --page-bg: #f1f5f9;
            --aftral-blue: #2d3663;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--page-bg);
            color: var(--doc-text);
            min-height: 100vh;
        }

        /* --- NAVBAR HARMONISÉE --- */
        .navbar {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-back-link {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-brand-title {
            font-size: 1.1rem;
            margin: 0;
            color: white;
            border-left: 1px solid rgba(255,255,255,0.2);
            padding-left: 20px;
        }

        .nav-brand-subtitle {
            color: #38bdf8;
            font-weight: normal;
            margin-left: 10px;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .btn-nav {
            background: rgba(56, 189, 248, 0.05);
            color: var(--blue);
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: var(--transition);
        }

            .btn-nav:hover {
                background: var(--blue);
                color: #0f172a;
                transform: translateY(-1px);
            }

        .btn-save-load {
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- RESTE DU STYLE --- */
        .main-container {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .document-card {
            background: var(--doc-bg);
            max-width: 1000px;
            width: 100%;
            border-radius: 12px;
            padding: 30px 40px;
            border: 1px solid var(--doc-border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--page-bg);
            padding-bottom: 15px;
        }

        .logo-text {
            color: #0055A4;
            font-weight: 800;
            font-size: 1.8rem;
        }

        .content-scroll {
            background: #fafafa;
            height: 500px;
            overflow-y: auto;
            padding: 25px 35px;
            border-radius: 8px;
            border: 1px solid var(--doc-border);
            margin-bottom: 25px;
            line-height: 1.6;
            outline: none;
        }

            .content-scroll:focus {
                border-color: var(--blue);
                background: #ffffff;
            }

        h2 {
            color: #0055A4;
            font-size: 1.3rem;
            margin-top: 25px;
            border-bottom: none;
            padding-bottom: 5px;
        }

        .validation-area {
            text-align: center;
            padding: 25px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid var(--doc-border);
        }

        #scrollInfo {
            color: #0055A4;
            font-weight: 600;
        }

        #rulesBox {
            padding: 10px;
            word-wrap: break-word; /* Force le texte à revenir à la ligne s'il est trop long */
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        button#btnSubmit {
            background: var(--aftral-blue); /* bleu AFTRAL */
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

            button#btnSubmit:hover:not(:disabled) {
                background: #1e254a; /* bleu foncé au hover */
                transform: translateY(-2px);
            }

            button#btnSubmit:disabled {
                background: #cbd5e1; /* gris doux */
                color: #94a3b8;
                cursor: not-allowed;
            }

        .success-msg {
            color: #16a34a;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .hidden {
            display: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 24px;
            width: 350px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(-30px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

            .modal-overlay.active .modal-content {
                transform: translateY(0);
            }

        .modal-icon-wrapper {
            width: 70px;
            height: 70px;
            background: #ecfdf5;
            color: #10b981;
            font-size: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .modal-title {
            font-weight: 800;
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--aftral-blue);
        }

        .btn-modal {
            background: var(--aftral-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }

            .btn-modal:hover {
                background: #1e254a;
                transform: scale(1.02);
            }

        .scorm-mode .navbar {
            display: none !important;
        }

        .scorm-mode .document-card {
            border: none;
            box-shadow: none;
            /* On réduit légèrement le max-width pour laisser respirer sur grand écran */
            max-width: 70%;
            max-height: 90vh; /* Hauteur maximale pour éviter de dépasser l'écran */
            width: 100%;
            /* Centre la carte et ajoute 20px d'espace en haut/bas */
            margin: 20px auto;
            /* Espace interne pour que le texte ne colle pas aux bords */
            padding: 25px;
            box-sizing: border-box;
        }

        /* CASE À COCHER PERSONNALISÉE */
        .checkbox-container span {
            position: relative;
            padding-left: 30px;
        }

            /* Carré de la checkbox */
            .checkbox-container span::before {
                content: "";
                position: absolute;
                left: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
                height: 18px;
                border: 2px solid var(--aftral-blue);
                border-radius: 4px;
                background: white;
                transition: 0.2s;
            }

            /* Check (✔) */
            .checkbox-container span::after {
                content: "";
                position: absolute;
                left: 5px;
                top: 50%;
                transform: translateY(-50%) scale(0);
                width: 6px;
                height: 10px;
                border: solid white;
                border-width: 0 2px 2px 0;
                transform-origin: center;
                transition: 0.2s;
            }

        /* État coché */
        .checkbox-container input[type="checkbox"]:checked + span::before {
            background-color: var(--aftral-blue);
            border-color: var(--aftral-blue);
        }

        .checkbox-container input[type="checkbox"]:checked + span::after {
            transform: translateY(-50%) scale(1) rotate(45deg);
        }

        .checkbox-container input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .checkbox-container {
            position: relative;
        }

        .checkbox-container:hover span::before {
             box-shadow: 0 0 0 3px rgba(45, 54, 99, 0.15);
        }

        .checkbox-container {
            cursor: pointer;
        }

    </style>
</head>
<body>

    <nav class="navbar" id="topNav">
        <div class="nav-left">
            <a href="../outils-hub.html" class="nav-back-link">
                <i class="fas fa-chevron-left"></i> Retour
            </a>
            <h1 class="nav-brand-title">
                IT PÉDAGOGIE <span class="nav-brand-subtitle">Règlement Intérieur</span>
            </h1>
        </div>

        <div class="nav-right">
           
            <button class="btn-nav btn-save-load" onclick="ouvrirApercu()">
                <i class="fas fa-eye"></i> Aperçu
            </button>

            <button class="btn-nav btn-save-load" onclick="exportConfig()">
                <i class="fas fa-download"></i> Sauver Config
            </button>
            <button class="btn-nav btn-save-load" onclick="document.getElementById('importFile').click()">
                <i class="fas fa-upload"></i> Charger Config
            </button>
            <button class="btn-nav" onclick="generateSCORM()">
                <i class="fas fa-file-zipper"></i> Générer SCORM
            </button>
        </div>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importConfig(this)">
    </nav>

    <div class="main-container">
        <div class="document-card">
            <header style="position: relative; border-bottom: 2px solid #e2e8f0; padding: 20px; margin-bottom: 20px;">
               
                    <!-- LOGO À GAUCHE -->
                    <img src="logo.png" alt="Logo"
                         style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); height: 90px; object-fit: contain;">

                    <!-- TEXTE CENTRÉ -->
                    <div style="text-align: center;">
                        <div class="logo-text" style="font-size: 1.4rem; font-weight: 800; color: #2d3663; line-height: 1.3; margin-bottom: 10px; text-transform: uppercase;">
                            RÈGLEMENT INTÉRIEUR GÉNÉRAL DES APPRENANTS
                        </div>

                        <h2 style="color: #334155; margin: 5px 0; font-size: 1.1rem; font-weight: 600;">
                            Organisme de formation et Centre de Formation d'Apprentis (CFA)
                        </h2>

                        <small style="color: #94a3b8; display: block; margin-top: 10px;">
                            <!-- texte secondaire -->
                        </small>
                    </div>
                </header>
                <div class="content-scroll" id="rulesBox" contenteditable="true">
                    <p style="text-align:center; padding:20px; color:#64748b;">
                        <i class="fas fa-spinner fa-spin"></i> Chargement des articles...
                    </p>
                </div>

                <div class="validation-area">
                    <div id="scrollInfo">
                        <i class="fas fa-chevron-down"></i>
                        <span>Faites défiler jusqu'au bout pour pouvoir signer</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div id="actionArea" class="hidden">
                        <label class="checkbox-container">
                            <input type="checkbox" id="checkAgree">
                            <span style="color: #1e293b; font-size: 0.9rem;">Je certifie avoir pris connaissance du règlement intérieur.</span>
                        </label>
                        <button id="btnSubmit" disabled>Valider et Signer</button>
                    </div>
                    <div id="msgSuccess" class="hidden success-msg">
                        <i class="fas fa-check-circle"></i> Signature enregistrée avec succès.
                        <div id="timestamp" style="font-size: 0.8rem; font-weight: normal; margin-top: 5px; color: #64748b;"></div>
                    </div>
                </div>
</div>
    </div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-icon-wrapper"><i class="fas fa-check" id="modalIcon"></i></div>
            <div class="modal-title" id="modalTitle">Succès !</div>
            <div class="modal-text" id="modalText" style="color: #64748b; margin-bottom: 20px;">Opération réussie.</div>
            <button class="btn-modal" onclick="closeModal()">Continuer</button>
        </div>
    </div>


    <script>
        // --- VARIABLES GLOBALES ---
        var api = null;
        var currentConfig = null;

        // --- INITIALISATION AU CHARGEMENT ---
        window.onload = function () {
            initSCORM();
            chargerReglement();
        };

        function importConfig(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const config = JSON.parse(e.target.result);
                    rulesBox.innerHTML = config.content;
                    verifierScrollNecessaire();
                    showModal("Succès", "Configuration chargée.");
                } catch (err) { showModal("Erreur", "Fichier invalide.", true); }
            };
            reader.readAsText(file);
            input.value = "";
        }

        // --- EXPORT / IMPORT CONFIG ---
        function exportConfig() {
            const blob = new Blob([JSON.stringify({ content: rulesBox.innerHTML })], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "CONFIG_Reglement.json";
            a.click();
        }


        // --- CHARGEMENT DU JSON ---
        async function chargerReglement() {
            const rulesBox = document.getElementById('rulesBox');
            if (!rulesBox) return;

            try {
                const response = await fetch('reglement.json');
                if (!response.ok) throw new Error("Fichier reglement.json introuvable");

                const data = await response.json();
                currentConfig = data;

                let html = "";
                                     
                // --- Conteneur d'en-tête Responsive ---
                html += `<div style="display: flex; flex-direction: column; align-items: center; width: 100%; margin-bottom: 30px; box-sizing: border-box; padding: 10px;">`;

                // Logo dynamique (Adaptatif : Petit sur mobile, Max 150px sur PC)
                if (data.logo) {
                    html += `<div style="width: 100%; text-align: center; margin-bottom: 10px;">
                <img src="${data.logo}" alt="Logo" 
                     style="width: 50px; height: auto; object-fit: contain;">
                 </div>`;
                }

                // Titres et Préambule
                html += `
                <div style="width: 100%; text-align: center;">
                    <h1 style="color:#0055A4; margin: 0 0 5px 0; font-size: 1.3rem; line-height: 1.2;">
                        ${data.titre_general}
                    </h1>
                    <p style="font-weight: bold; margin: 0 0 8px 0; font-size: 1rem;">
                        ${data.sous_titre}
                    </p>
                   <div style="display: inline-block; background: #f1f5f9; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; color: #475569; margin-bottom: 15px; border: 1px solid #e2e8f0;">
                        ${data.code_document} • ${data.version}
                    </div>
                    <p style="font-size: 0.85rem; color: #475569; margin: 0; line-height: 1.4;">
                        ${data.preambule}
                    </p>
                </div>`;

                // 1. Fonction utilitaire pour générer des listes proprement
                const renderList = (items) => items ? `<ul>${items.map(i => `<li>${typeof i === 'string' ? i : (i.texte || i.id)}</li>`).join('')}</ul>` : '';

                        


               
                // 2. Boucle des Sections
                data.sections.forEach(section => {
                    html += `<h2 style="background:#2d3663; color:white; padding:12px; border-radius:4px; margin-top:40px;">Section ${section.id} : ${section.titre}</h2>`;

                    if (section.contenu_introductif) html += `<p><strong>${section.contenu_introductif}</strong></p>`;
                    html += renderList(section.objectifs);



                    //html += `<h2 style="background:#2d3663; color:white; padding:12px; border-radius:4px; margin-top:40px;">Section ${section.id} : ${section.titre}</h2>`;

                    //if (section.contenu_introductif) html += `<p><strong>${section.contenu_introductif}</strong></p>`;
                    //html += renderList(section.objectifs);

                    if (section.champ_application) html += `<p style="background:#f1f5f9; padding:10px; border-left:4px solid #38bdf8;">${section.champ_application}</p>`;

                    // --- AJOUT : Disposition spécifique Apprentis (Niveau SECTION) ---
                    if (section.disposition_specifique_apprentis) {
                        html += `<div style="background:#fff7ed; border:1px solid #fdba74; padding:15px; border-radius:6px; margin:20px 0;">
             <strong style="color:#9a3412;"><i class="fas fa-user-graduate"></i> Disposition spécifique aux apprentis :</strong>
             <p style="margin-top:5px; color:#7c2d12; margin-bottom:0;">${section.disposition_specifique_apprentis}</p>
          </div>`;
                    }

                    if (section.articles) {
                        section.articles.forEach(art => {
                            html += `<div style="margin-top:25px; border-bottom:1px solid #eee; padding-bottom:15px;">
                 <h3 style="color:#0055A4;">Article ${art.num} : ${art.titre}</h3>
                 ${art.texte ? `<p>${art.texte}</p>` : ''}`;

                            // --- AJOUT : Disposition spécifique Apprentis (Niveau ARTICLE) ---
                            if (art.disposition_specifique_apprentis) {
                                html += `<div style="background:#fff7ed; border-left:3px solid #f97316; padding:8px 12px; margin-top:10px; font-size:0.9rem;">
                     <strong style="color:#9a3412;"><i class="fas fa-info-circle"></i> Spécificité Apprentis :</strong> 
                     <span style="color:#7c2d12;">${art.disposition_specifique_apprentis}</span>
                  </div>`;
                            }

                            // Notes simples
                            if (art.note) {
                                html += `<div style="margin-top:12px; padding:10px; background:#f0f9ff; border-radius:4px; border-left:4px solid #0ea5e9; font-size:0.9rem; color:#0369a1;">
                     <i class="fas fa-lightbulb"></i> <strong>Note :</strong> ${art.note}
                  </div>`;
                            }

                            // --- AJOUT : Procédure de contrôle ---
                            if (art.procedure_controle) {
                                html += `<div style="background:#f8fafc; border:1px solid #cbd5e1; border-radius:8px; padding:15px; margin:15px 0;">
                     <strong style="color:#334155;">${art.procedure_controle.description || "Procédure de contrôle :"}</strong>
                     ${renderList(art.procedure_controle.points)}
                  </div>`;
                            }

                            // --- AJOUT : Formation à distance (Complet) ---
                            if (art.formation_distance) {
                                html += `<div style="background:#f0fdf4; border:1px solid #bbf7d0; padding:15px; border-radius:8px; margin:15px 0; font-size:0.9rem; color:#166534;">
                     <strong><i class="fas fa-laptop-house"></i> Modalités Distanciel :</strong>
                     ${art.formation_distance.regles ? `<p>${art.formation_distance.regles}</p>` : ''}
                     ${renderList(art.formation_distance.points || art.formation_distance.consideres_comme_absences)}
                  </div>`;
                            }

                            // Listes automatiques
                            html += renderList(art.points);
                            html += renderList(art.comportements_interdits);
                            html += renderList(art.actes_frauduleux);

                            // Gestion des Sanctions
                            if (art.echelle_sanctions || art.sanctions) {
                                html += `<div style="color:#b91c1c; font-weight:600; margin-top:10px;">🔴 Sanctions :</div>`;
                                html += renderList(art.echelle_sanctions || art.sanctions);
                            }

                            // Sous-articles
                            if (art.sous_articles) {
                                art.sous_articles.forEach(sub => {
                                    html += `<div style="margin-left:20px; border-left:2px solid #e2e8f0; padding-left:15px; margin-top:15px;">
                         <h4 style="color:#1e293b;">${sub.id} ${sub.titre}</h4>
                         <p>${sub.texte || ""}</p>
                         ${sub.disposition_specifique_apprentis ? `<p style="font-size:0.85rem; color:#9a3412;"><em><strong>Note Apprentis :</strong> ${sub.disposition_specifique_apprentis}</em></p>` : ''}
                         ${renderList(sub.points)}
                      </div>`;
                                });
                            }

                            // Étapes de procédure (Article 25)
                            if (art.etapes) {
                                art.etapes.forEach(step => {
                                    html += `<p style="font-size:0.9rem; margin-top:8px;"><strong>${step.etape} :</strong> ${step.texte}</p>`;
                                });
                            }

                            html += `</div>`;
                        });
                    }
                });


                // Fin BOUCLE



                html += `<p style="text-align:center; margin-top:30px; color:#94a3b8;">*** Fin du document ***</p>`;
                rulesBox.innerHTML = html;

                // Une fois le contenu chargé, on vérifie si le scroll est nécessaire
                verifierScrollNecessaire();

            } catch (err) {
                console.error(err);
                rulesBox.innerHTML = `<div style="color:red; text-align:center; padding:50px;">Erreur critique : Impossible de charger reglement.json</div>`;
            }
        }

        // --- LOGIQUE DE SCROLL ---
        function verifierScrollNecessaire() {
            const rb = document.getElementById('rulesBox');
            if (!rb) return;
            setTimeout(() => {
                if (rb.scrollHeight <= rb.clientHeight + 20) {
                    document.getElementById('scrollInfo')?.classList.add('hidden');
                    document.getElementById('actionArea')?.classList.remove('hidden');
                }
            }, 800);
        }

        document.getElementById('rulesBox').onscroll = function () {
            if (this.scrollHeight - this.scrollTop <= this.clientHeight + 20) {
                document.getElementById('scrollInfo')?.classList.add('hidden');
                document.getElementById('actionArea')?.classList.remove('hidden');
            }
        };

        // --- SIGNATURE ET ÉMARGEMENT ---
        document.getElementById('checkAgree').onchange = function () {
            document.getElementById('btnSubmit').disabled = !this.checked;
        };

        document.getElementById('btnSubmit').onclick = function () {
            const dateStr = new Date().toLocaleString('fr-FR');
            completeSCORM(dateStr); // Envoi au LMS

            this.classList.add('hidden');
            document.getElementById('checkAgree').disabled = true;
            document.getElementById('timestamp').innerText = "Le " + dateStr;
            document.getElementById('msgSuccess').classList.remove('hidden');
            // showModal("Signé !", "Votre émargement a été enregistré avec succès.");
        };

        // --- POPUP MODAL ---
        function showModal(title, text, isError = false) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            const wrapper = document.querySelector('.modal-icon-wrapper');
            const icon = document.getElementById('modalIcon');
            if (isError) {
                wrapper.style.background = "#fee2e2"; wrapper.style.color = "#ef4444";
                icon.className = "fas fa-times";
            } else {
                wrapper.style.background = "#ecfdf5"; wrapper.style.color = "#10b981";
                icon.className = "fas fa-check";
            }
            document.getElementById('modalOverlay').classList.add('active');
        }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

        // --- SCORM 1.2 (LOGIQUE RUNTIME) ---
        function initSCORM() {
            var win = window;
            while ((win.API == null) && (win.parent != null) && (win.parent != win)) { win = win.parent; }
            api = win.API;
            if (api) {
                api.LMSInitialize("");
                api.LMSSetValue("cmi.core.lesson_status", "incomplete");
                api.LMSCommit("");
            }
        }

        function completeSCORM(timestampStr) {
            if (api) {
                api.LMSSetValue("cmi.core.lesson_status", "passed");
                api.LMSSetValue("cmi.core.score.raw", "100");
                api.LMSSetValue("cmi.comments", "Signé numériquement le : " + timestampStr);
                api.LMSCommit("");
                api.LMSFinish("");
            }
        }

        // --- GÉNÉRATION DU PACKAGE SCORM ZIP ---
        
        async function generateSCORM() {

            // --- ZONE DE SÉCURITÉ ---
            const passwordSecret = "Aftral1969"; // Change ce mot de passe ici
            const saisie = prompt("Veuillez saisir le mot de passe pour générer le package SCORM :");

            // Si l'utilisateur clique sur "Annuler"
            if (saisie === null) return;

            // Vérification du mot de passe
            if (saisie !== passwordSecret) {
                showModal("Accès refusé", "Mot de passe incorrect.", true);
                return;
            }
            // ------------------------

            const rulesBox = document.getElementById('rulesBox');

            // Vérification : le règlement est-il vide ?
            if (rulesBox.innerHTML.trim() === "" || rulesBox.innerHTML.includes("Erreur critique")) {
                showModal("Erreur", "Le contenu du règlement est vide ou invalide.", true);
                return;
            }

            try {
                const zip = new JSZip();

                // --- GESTION DU LOGO EN BASE64 ---
                let logoDataUri = "";
                const displayedLogo = rulesBox.querySelector('img');
               
                if (displayedLogo && displayedLogo.src.startsWith('data:image')) {
                    // Cas 1 : L'image est déjà en Base64 dans la page
                    logoDataUri = displayedLogo.src;
                } else if (displayedLogo) {
                    // Cas 2 : L'image est une URL, on la convertit via Canvas pour éviter les soucis de fetch
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = displayedLogo.naturalWidth;
                        canvas.height = displayedLogo.naturalHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(displayedLogo, 0, 0);
                        logoDataUri = canvas.toDataURL('image/png');
                    } catch (e) {
                        console.warn("Échec conversion Canvas, tentative via Fetch...");
                    }
                }

                // Si le Canvas a échoué ou n'était pas possible, on garde votre logique Fetch en dernier recours
                if (!logoDataUri) {
                    const logoUrl = currentConfig?.logo || "logo.png";
                    try {
                        const response = await fetch(logoUrl);
                        const blob = await response.blob();
                        logoDataUri = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onloadend = () => resolve(reader.result);
                            reader.readAsDataURL(blob);
                        });
                    } catch (e) {
                        console.error("Impossible de récupérer le logo pour le Base64", e);
                    }
                }

                // 1. On récupère le HTML de l'éditeur (rulesBox)
                const currentContent = document.getElementById('rulesBox').innerHTML;
                const finalHtml = buildReglementHtml(currentContent, logoDataUri);

                // 2. On ajoute le fichier principal
                zip.file("index.html", finalHtml);

                // 3. Manifest SCORM 1.2 (Standard ADL)
                const manifest = `<?xml version="1.0" encoding="UTF-8" standalone="no" ?>
<manifest identifier="AftralReglement" version="1.2" 
          xmlns="http://www.imsproject.org/xsd/imscp_rootv1p1p2"
          xmlns:adlcp="http://www.adlnet.org/xsd/adlcp_rootv1p2"
          xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
          xsi:schemaLocation="http://www.imsproject.org/xsd/imscp_rootv1p1p2 imscp_rootv1p1p2.xsd
                              http://www.imsproject.org/xsd/imsmd_rootv1p2 imsmd_rootv1p2.xsd
                              http://www.adlnet.org/xsd/adlcp_rootv1p2 adlcp_rootv1p1p2.xsd">
    <metadata>
        <schema>ADL SCORM</schema>
        <schemaversion>1.2</schemaversion>
    </metadata>
    <organizations default="aftral_org">
        <organization identifier="aftral_org">
            <title>Reglement Interieur Aftral</title>
            <item identifier="item1" identifierref="res1">
                <title>Règlement Intérieur</title>
            </item>
        </organization>
    </organizations>
    <resources>
        <resource identifier="res1" type="webcontent" adlcp:scormtype="sco" href="index.html">
            <file href="index.html"/>
        </resource>
    </resources>
</manifest>`;

                if (!logoDataUri.startsWith("data:image")) {
                    try {
                        const imgResponse = await fetch(logoUrl);
                        const imgBlob = await imgResponse.blob();
                        zip.file(logoUrl, imgBlob); // On ajoute le fichier image à la racine du ZIP
                    } catch (err) {
                        console.error("Le logo n'a pas pu être ajouté au package.");
                    }
                }

                zip.file("imsmanifest.xml", manifest);

                // 4. Génération et téléchargement
                const content = await zip.generateAsync({ type: "blob" });
                const a = document.createElement("a");
                const url = URL.createObjectURL(content);
                a.href = url;
                a.download = "SCORM_Reglement_Aftral.zip";
                a.click();

                // Nettoyage mémoire
                setTimeout(() => URL.revokeObjectURL(url), 1000);
                showModal("Succès", "Le package SCORM a été généré.");

            } catch (err) {
                console.error(err);
                showModal("Erreur", "Échec de la génération du ZIP.", true);
            }
        }


        function buildReglementHtml(contentHtml, logoForced = null) {
            // Si pas de config chargée, on met des valeurs par défaut
            const logo = logoForced || currentConfig?.logo || "";
            const titre = currentConfig?.titre_general || "RÈGLEMENT INTÉRIEUR GÉNÉRAL DES APPRENANTS";
            const sousTitre = currentConfig?.sous_titre || "Organisme de formation et Centre de Formation d'Apprentis (CFA)";
            const codeDoc = currentConfig?.code_document || "";
            const version = currentConfig?.version || "";

            // On nettoie le contenu pour éviter des erreurs de guillemets dans l'injection JS
            const sanitizedContent = contentHtml.replace(/`/g, '\\`').replace(/\$/g, '\\$');

            return `<!DOCTYPE html>
            <html lang="fr">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>Règlement Intérieur - AFTRAL</title>

                        --doc-bg: #ffffff;

                    }

                        justify-content: center;
                        padding: 20px;
                    }

                    .document-card {
                        background: var(--doc-bg);
                        max-width: 900px;
                        width: 100%;
                        border-radius: 12px;
                        padding: 30px;
                        border: 1px solid var(--doc-border);
                        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
                    }

                    header {
                        text-align: center;
                        border-bottom: 2px solid var(--page-bg);
                        padding-bottom: 20px;
                        margin-bottom: 20px;
                    }

                    .content-scroll {
                        background: #fafafa;
                        height: 500px;
                        overflow-y: auto;
                        padding: 25px;
                        border-radius: 8px;
                        border: 1px solid var(--doc-border);
                        line-height: 1.6;
                        margin-bottom: 25px;
                    }

                    /* Styles des titres à l'intérieur du règlement */
                    .content-scroll h2 { 
                        background: var(--aftral-blue); 
                        color: white; 
                        padding: 12px; 
                        border-radius: 4px; 
                        font-size: 1.1rem;
                        margin-top: 30px;
                    }
        
                    .content-scroll h3 { color: #0055A4; border-bottom: 1px solid #eee; }

                    .validation-area {
                        text-align: center;
                        padding: 25px;
                        background: #f8fafc;
                        border-radius: 12px;
                        border: 1px solid var(--doc-border);
                    }

                    #btnSubmit {
                        background: var(--aftral-blue);
                        color: white;
                        border: none;
                        padding: 14px 40px;
                        border-radius: 8px;
                        font-weight: 700;
                        cursor: pointer;
                        transition: all 0.3s ease;
                    }

                    #btnSubmit:disabled {
                        background: #cbd5e1;
                        color: #94a3b8;
                        cursor: not-allowed;
                    }

                    .checkbox-container {
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        gap: 12px;
                        margin-bottom: 20px;
                        cursor: pointer;
                        font-weight: 600;
                    }

                    .hidden { display: none; }
                    .success-msg { color: #16a34a; font-weight: 700; font-size: 1.1rem; }
        
                    /* Responsive mobile */
                    @media (max-width: 600px) {
                        .document-card { padding: 15px; }
                        .content-scroll { height: 400px; padding: 15px; }
                    }

                    /* taille logo */
                    .logo-small {
                        width: 50px;
                        height: auto;
                        object-fit: contain;
                        display: block;
                        margin: 0 auto 15px auto;
                    }

                    .checkbox-container {
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        gap: 12px;
                        margin-bottom: 20px;
                        cursor: pointer;
                        font-weight: 600;
                        padding: 10px;
                        background: #ffffff; /* Pour bien voir la zone sur fond gris */
                        border-radius: 6px;
                    }

                    input[type="checkbox"] {
                        width: 18px;
                        height: 18px;
                        cursor: pointer;
                    }


                </style>
            </head>
            <body>

                <div class="document-card">
                    <header>
                        ${logo ? `<img src="${logo}" alt="Logo" class="logo-small">` : ''}
                        <div style="font-weight: 800; color: #2d3663; font-size: 1.2rem; text-transform: uppercase; margin-bottom:5px;">
                            ${titre}
                        </div>
                        <div style="font-weight: bold; font-size: 0.9rem; margin-bottom:10px;">

                        </div>
                    </header>

                    <div class="content-scroll" id="rulesBox">
                        ${sanitizedContent}
                    </div>

                    <div class="validation-area">
                        <div id="scrollInfo">
                            <i class="fas fa-chevron-down"></i>
                            <span>Veuillez lire le document jusqu'au bout pour pouvoir signer</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>

                        <div id="actionArea" class="hidden">
                            <label class="checkbox-container">
                                <input type="checkbox" id="checkAgree" onchange="document.getElementById('btnSubmit').disabled = !this.checked">
                                <span>Je certifie avoir pris connaissance du règlement intérieur.</span>
                            </label>
                            <button id="btnSubmit" disabled onclick="finaliserSignature()">Valider et Signer</button>
                        </div>

                        <div id="msgSuccess" class="hidden success-msg">
                            <i class="fas fa-check-circle"></i> Signature enregistrée avec succès.
                        </div>
                    </div>
                </div>

                <script>
                    var api = null;

                    // 1. Recherche de l'API SCORM 1.2
                    function findAPI(win) {
                        var n = 0;
                        while ((win.API == null) && (win.parent != null) && (win.parent != win) && (n < 10)) {
                            win = win.parent; n++;
                        }
                        return win.API;
                    }

                    window.onload = function() {
                        api = findAPI(window);
                        let dejaSigne = false;

                        if (api) {
                            api.LMSInitialize("");
                            // On récupère le statut actuel dans le LMS
                            var status = api.LMSGetValue("cmi.core.lesson_status");
        
                            // Si le statut est "passed" ou "completed", l'utilisateur a déjà signé
                            if(status === "passed" || status === "completed") {
                                dejaSigne = true;
                                afficherSucces();
                                // Optionnel : On peut ajouter un message spécifique
                                document.getElementById('msgSuccess').innerHTML = 
                                    '<i class="fas fa-check-circle"></i> ' + 
                                    (api.LMSGetValue("cmi.comments") || "lors d'une session précédente.");
                            }
                        }

                        const rb = document.getElementById('rulesBox');
    
                        // On n'active la logique de scroll que si l'utilisateur n'a PAS encore signé
                        if (!dejaSigne) {
                            rb.onscroll = function() {
                                if (this.scrollHeight - this.scrollTop <= this.clientHeight + 40) {
                                    document.getElementById('scrollInfo').classList.add('hidden');
                                    document.getElementById('actionArea').classList.remove('hidden');
                                }
                            };

                            if (rb.scrollHeight <= rb.clientHeight) {
                                document.getElementById('scrollInfo').classList.add('hidden');
                                document.getElementById('actionArea').classList.remove('hidden');
                            }
                        }
                    };

                    function finaliserSignature() {
                        const dateStr = new Date().toLocaleString('fr-FR');
            
                        if (api) {
                            api.LMSSetValue("cmi.core.lesson_status", "passed");
                            api.LMSSetValue("cmi.core.score.raw", "100");
                            api.LMSSetValue("cmi.comments", "Signé numériquement le : " + dateStr);
                            api.LMSCommit("");
                            api.LMSFinish("");
                        }
            
                        afficherSucces();
                    }

                    function afficherSucces() {
                        document.getElementById('scrollInfo').classList.add('hidden');
                        document.getElementById('actionArea').classList.add('hidden');
                        document.getElementById('msgSuccess').classList.remove('hidden');
                    }
                <\/script>
            </body>
            </html>`;
        }


        async function ouvrirApercu() {
            const currentContent = document.getElementById('rulesBox').innerHTML;
            const logoUrl = currentConfig?.logo || "logo.png"; // On force "logo.png" par défaut si vide

            let logoDataUri = logoUrl; // Par défaut, on garde le chemin relatif

            try {
                const response = await fetch(logoUrl);
                if (response.ok) {
                    const blob = await response.blob();
                    logoDataUri = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.readAsDataURL(blob);
                    });
                }
            } catch (e) {
                console.warn("Mode local : impossible de convertir en Base64, utilisation du chemin relatif.");
                // On ne fait rien, logoDataUri reste "logo.png"
            }

            const htmlFinal = buildReglementHtml(currentContent, logoDataUri);
            const win = window.open("", "_blank");
            if (win) {
                win.document.write(htmlFinal);
                win.document.close();
            }
        }


    </script>
