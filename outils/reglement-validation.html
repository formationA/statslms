<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Règlement Intérieur - AFTRAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --nav-bg: #0f172a;
            --blue: #38bdf8;
            --text-nav: #f8fafc;
            --doc-bg: #ffffff;
            --doc-text: #1e293b;
            --doc-dim: #64748b;
            --doc-border: #e2e8f0;
            --page-bg: #f1f5f9;
            --aftral-blue: #0055A4; /* Le bleu demandé */
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--page-bg);
            color: var(--doc-text);
        }

        /* --- NAVBAR (Style Original Conservé) --- */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            background: var(--nav-bg);
            color: var(--text-nav);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-brand-title {
            font-size: 1.2rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Logo AFTRAL dans la nav */
        .logo-aftral-nav {
            color: var(--aftral-blue);
            background: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 0.9rem;
        }

        .btn-nav {
            background: transparent;
            color: var(--blue);
            border: 1px solid var(--blue);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }

        /* --- DOCUMENT --- */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .document-card {
            background: var(--doc-bg);
            max-width: 900px;
            width: 100%;
            padding: 50px;
            border: 1px solid var(--doc-border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .content-scroll {
            height: 500px;
            overflow-y: auto;
            border: 1px solid var(--doc-border);
            padding: 20px;
            margin-bottom: 30px;
            background: #fff;
        }

        /* --- CHECKBOX AGRANDIE --- */
        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        #checkAgree {
            width: 25px;
            height: 25px;
            cursor: pointer;
            accent-color: var(--aftral-blue);
        }

        .validation-area {
            text-align: center;
            border-top: 1px solid var(--doc-border);
            padding-top: 20px;
        }

        #btnSubmit {
            background: var(--aftral-blue);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

            #btnSubmit:disabled {
                background: #ccc;
                cursor: not-allowed;
            }

        .hidden {
            display: none;
        }

        /* Modal simple */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <span class="logo-aftral-nav">AFTRAL</span>
            <h1 class="nav-brand-title">IT PÉDAGOGIE</h1>
        </div>
        <div class="nav-right">
            <button class="btn-nav" onclick="exportConfig()">Exporter JSON</button>
            <button class="btn-nav" onclick="document.getElementById('importFile').click()">Importer JSON</button>
            <button class="btn-nav" onclick="generateSCORM()">Générer SCORM</button>
            <input type="file" id="importFile" class="hidden" onchange="importConfig(this)">
        </div>
    </nav>

    <div class="main-container">
        <div class="document-card">
            <header style="text-align: center; margin-bottom: 40px;">
                <h1 style="color: var(--aftral-blue); font-size: 2.5rem; margin: 0;">AFTRAL</h1>
                <h2 style="color: var(--aftral-blue); text-transform: uppercase;">Règlement Intérieur</h2>
            </header>

            <div class="content-scroll" id="rulesBox" contenteditable="true">
            </div>

            <div class="validation-area">
                <div id="scrollInfo" style="color: var(--aftral-blue); font-weight: bold;">
                    <i class="fas fa-arrow-down"></i> Veuillez lire l'intégralité du document pour signer.
                </div>

                <div id="actionArea" class="hidden">
                    <div class="checkbox-container">
                        <input type="checkbox" id="checkAgree">
                        <label for="checkAgree">Je certifie avoir lu et accepté le règlement intérieur.</label>
                    </div>
                    <button id="btnSubmit" disabled>Valider la signature</button>
                </div>

                <div id="msgSuccess" class="hidden">
                    <h3 style="color: green;"><i class="fas fa-check"></i> Signature enregistrée</h3>
                    <p id="timestamp"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay hidden">
        <div style="background: white; padding: 30px; border-radius: 10px; text-align: center;">
            <h3 id="modalTitle"></h3>
            <p id="modalText"></p>
            <button class="btn-nav" style="background: var(--aftral-blue); color: white;" onclick="closeModal()">Fermer</button>
        </div>
    </div>

    <script>
        // --- FONCTIONS SCORM ET LOGIQUE (CONSERVÉES) ---
        var api = null;
        function initSCORM() {
            var win = window;
            while ((win.API == null) && (win.parent != null) && (win.parent != win)) { win = win.parent; }
            api = win.API;
            if (api) api.LMSInitialize("");
        }

        async function chargerReglement() {
            try {
                const response = await fetch('reglement.json');
                const data = await response.json();
                const box = document.getElementById('rulesBox');
                let html = "";
                data.sections.forEach(s => {
                    html += `<h2 style="color: var(--aftral-blue)">${s.titre}</h2>`;
                    s.articles.forEach(a => {
                        html += `<h3>Article ${a.num}</h3><p>${a.texte}</p>`;
                    });
                });
                box.innerHTML = html;
            } catch (e) { console.error("Erreur JSON"); }
        }

        // Sécurité de défilement
        const rulesBox = document.getElementById('rulesBox');
        rulesBox.onscroll = function () {
            if (rulesBox.scrollHeight - rulesBox.scrollTop <= rulesBox.clientHeight + 50) {
                document.getElementById('scrollInfo').classList.add('hidden');
                document.getElementById('actionArea').classList.remove('hidden');
            }
        };

        document.getElementById('checkAgree').onchange = function () {
            document.getElementById('btnSubmit').disabled = !this.checked;
        };

        document.getElementById('btnSubmit').onclick = function () {
            const now = new Date().toLocaleString();
            if (api) {
                api.LMSSetValue("cmi.core.lesson_status", "completed");
                api.LMSCommit("");
            }
            document.getElementById('actionArea').classList.add('hidden');
            document.getElementById('msgSuccess').classList.remove('hidden');
            document.getElementById('timestamp').innerText = "Signé le : " + now;
            showModal("Succès", "Votre signature a été transmise.");
        };

        // Fonctions techniques
        function showModal(t, txt) {
            document.getElementById('modalTitle').innerText = t;
            document.getElementById('modalText').innerText = txt;
            document.getElementById('modalOverlay').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }

        function exportConfig() {
            const blob = new Blob([JSON.stringify({ html: rulesBox.innerHTML })], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "config.json";
            a.click();
        }

        function importConfig(input) {
            const reader = new FileReader();
            reader.onload = (e) => { rulesBox.innerHTML = JSON.parse(e.target.result).html; };
            reader.readAsText(input.files[0]);
        }

        function generateSCORM() {
            const zip = new JSZip();
            zip.file("index.html", document.documentElement.outerHTML);
            zip.generateAsync({ type: "blob" }).then(c => {
                const a = document.createElement("a");
                a.href = URL.createObjectURL(c);
                a.download = "scorm_aftral.zip";
                a.click();
            });
        }

        window.onload = function () { initSCORM(); chargerReglement(); };
    </script>
</body>
</html>
