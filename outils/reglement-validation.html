<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Règlement Intérieur - AFTRAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --nav-bg: #0f172a;
            --blue: #38bdf8;
            --text-nav: #f8fafc;
            --doc-bg: #ffffff;
            --doc-text: #1e293b;
            --doc-dim: #64748b;
            --doc-border: #e2e8f0;
            --page-bg: #f1f5f9;
            --aftral-blue: #2d3663;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--page-bg);
            color: var(--doc-text);
            min-height: 100vh;
        }

        /* --- NAVBAR HARMONISÉE --- */
        .navbar {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-back-link {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-brand-title {
            font-size: 1.1rem;
            margin: 0;
            color: white;
            border-left: 1px solid rgba(255,255,255,0.2);
            padding-left: 20px;
        }

        .nav-brand-subtitle {
            color: #38bdf8;
            font-weight: normal;
            margin-left: 10px;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .btn-nav {
            background: rgba(56, 189, 248, 0.05);
            color: var(--blue);
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: var(--transition);
        }

            .btn-nav:hover {
                background: var(--blue);
                color: #0f172a;
                transform: translateY(-1px);
            }

        .btn-save-load {
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- RESTE DU STYLE --- */
        .main-container {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .document-card {
            background: var(--doc-bg);
            max-width: 1000px;
            width: 100%;
            border-radius: 12px;
            padding: 30px 40px;
            border: 1px solid var(--doc-border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--page-bg);
            padding-bottom: 15px;
        }

        .logo-text {
            color: #0055A4;
            font-weight: 800;
            font-size: 1.8rem;
        }

        .content-scroll {
            background: #fafafa;
            height: 500px;
            overflow-y: auto;
            padding: 25px 35px;
            border-radius: 8px;
            border: 1px solid var(--doc-border);
            margin-bottom: 25px;
            line-height: 1.6;
            outline: none;
        }

            .content-scroll:focus {
                border-color: var(--blue);
                background: #ffffff;
            }

        h2 {
            color: #0055A4;
            font-size: 1.3rem;
            margin-top: 25px;
            border-bottom: none;
            padding-bottom: 5px;
        }

        .validation-area {
            text-align: center;
            padding: 25px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid var(--doc-border);
        }

        #scrollInfo {
            color: #0055A4;
            font-weight: 600;
        }

        #rulesBox {
            padding: 10px;
            word-wrap: break-word; /* Force le texte à revenir à la ligne s'il est trop long */
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        button#btnSubmit {
            background: var(--aftral-blue); /* bleu AFTRAL */
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

            button#btnSubmit:hover:not(:disabled) {
                background: #1e254a; /* bleu foncé au hover */
                transform: translateY(-2px);
            }

            button#btnSubmit:disabled {
                background: #cbd5e1; /* gris doux */
                color: #94a3b8;
                cursor: not-allowed;
            }

        .success-msg {
            color: #16a34a;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .hidden {
            display: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 24px;
            width: 350px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(-30px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

            .modal-overlay.active .modal-content {
                transform: translateY(0);
            }

        .modal-icon-wrapper {
            width: 70px;
            height: 70px;
            background: #ecfdf5;
            color: #10b981;
            font-size: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .modal-title {
            font-weight: 800;
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--aftral-blue);
        }

        .btn-modal {
            background: var(--aftral-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }

            .btn-modal:hover {
                background: #1e254a;
                transform: scale(1.02);
            }

        .scorm-mode .navbar {
            display: none !important;
        }

        .scorm-mode .document-card {
            border: none;
            box-shadow: none;
            /* On réduit légèrement le max-width pour laisser respirer sur grand écran */
            max-width: 70%;
            max-height: 90vh; /* Hauteur maximale pour éviter de dépasser l'écran */
            width: 100%;
            /* Centre la carte et ajoute 20px d'espace en haut/bas */
            margin: 20px auto;
            /* Espace interne pour que le texte ne colle pas aux bords */
            padding: 25px;
            box-sizing: border-box;
        }

        /* CASE À COCHER PERSONNALISÉE */
        .checkbox-container span {
            position: relative;
            padding-left: 30px;
        }

            /* Carré de la checkbox */
            .checkbox-container span::before {
                content: "";
                position: absolute;
                left: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
                height: 18px;
                border: 2px solid var(--aftral-blue);
                border-radius: 4px;
                background: white;
                transition: 0.2s;
            }

            /* Check (✔) */
            .checkbox-container span::after {
                content: "";
                position: absolute;
                left: 5px;
                top: 50%;
                transform: translateY(-50%) scale(0);
                width: 6px;
                height: 10px;
                border: solid white;
                border-width: 0 2px 2px 0;
                transform-origin: center;
                rotate: 45deg;
                transition: 0.2s;
            }

        /* État coché */
        .checkbox-container input[type="checkbox"]:checked + span::before {
            background-color: var(--aftral-blue);
            border-color: var(--aftral-blue);
        }

        .checkbox-container input[type="checkbox"]:checked + span::after {
            transform: translateY(-50%) scale(1) rotate(45deg);
        }

        .checkbox-container input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .checkbox-container {
            position: relative;
        }

        .checkbox-container:hover span::before {
             box-shadow: 0 0 0 3px rgba(45, 54, 99, 0.15);
        }

        .checkbox-container {
            cursor: pointer;
        }

    </style>
</head>
<body>

    <nav class="navbar" id="topNav">
        <div class="nav-left">
            <a href="../outils-hub.html" class="nav-back-link">
                <i class="fas fa-chevron-left"></i> Retour
            </a>
            <h1 class="nav-brand-title">
                IT PÉDAGOGIE <span class="nav-brand-subtitle">Règlement Intérieur</span>
            </h1>
        </div>

        <div class="nav-right">
            <button class="btn-nav btn-save-load" onclick="exportConfig()">
                <i class="fas fa-download"></i> Sauver Config
            </button>
            <button class="btn-nav btn-save-load" onclick="document.getElementById('importFile').click()">
                <i class="fas fa-upload"></i> Charger Config
            </button>
            <button class="btn-nav" onclick="generateSCORM()">
                <i class="fas fa-file-zipper"></i> Générer SCORM
            </button>
        </div>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importConfig(this)">
    </nav>

    <div class="main-container">
        <div class="document-card">
            <header style="position: relative; border-bottom: 2px solid #e2e8f0; padding: 20px; margin-bottom: 20px;">
               
                    <!-- LOGO À GAUCHE -->
                    <img src="logo.png" alt="Logo"
                         style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); height: 90px; object-fit: contain;">

                    <!-- TEXTE CENTRÉ -->
                    <div style="text-align: center;">
                        <div class="logo-text" style="font-size: 1.4rem; font-weight: 800; color: #2d3663; line-height: 1.3; margin-bottom: 10px; text-transform: uppercase;">
                            RÈGLEMENT INTÉRIEUR GÉNÉRAL DES APPRENANTS
                        </div>

                        <h2 style="color: #334155; margin: 5px 0; font-size: 1.1rem; font-weight: 600;">
                            Organisme de formation et Centre de Formation d'Apprentis (CFA)
                        </h2>

                        <small style="color: #94a3b8; display: block; margin-top: 10px;">
                            <!-- texte secondaire -->
                        </small>
                    </div>
                </header>
                <div class="content-scroll" id="rulesBox" contenteditable="true">
                    <p style="text-align:center; padding:20px; color:#64748b;">
                        <i class="fas fa-spinner fa-spin"></i> Chargement des articles...
                    </p>
                </div>

                <div class="validation-area">
                    <div id="scrollInfo">
                        <i class="fas fa-chevron-down"></i>
                        <span>Faites défiler jusqu'au bout pour pouvoir signer</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div id="actionArea" class="hidden">
                        <label class="checkbox-container">
                            <input type="checkbox" id="checkAgree">
                            <span style="color: #1e293b; font-size: 0.9rem;">Je certifie avoir pris connaissance du règlement intérieur.</span>
                        </label>
                        <button id="btnSubmit" disabled>Valider et Signer</button>
                    </div>
                    <div id="msgSuccess" class="hidden success-msg">
                        <i class="fas fa-check-circle"></i> Signature enregistrée avec succès.
                        <div id="timestamp" style="font-size: 0.8rem; font-weight: normal; margin-top: 5px; color: #64748b;"></div>
                    </div>
                </div>
</div>
    </div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-icon-wrapper"><i class="fas fa-check" id="modalIcon"></i></div>
            <div class="modal-title" id="modalTitle">Succès !</div>
            <div class="modal-text" id="modalText" style="color: #64748b; margin-bottom: 20px;">Opération réussie.</div>
            <button class="btn-modal" onclick="closeModal()">Continuer</button>
        </div>
    </div>


    <script>
        // --- VARIABLES GLOBALES ---
        var api = null;

        // --- INITIALISATION AU CHARGEMENT ---
        window.onload = function () {
            initSCORM();
            chargerReglement();
        };

        function importConfig(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const config = JSON.parse(e.target.result);
                    rulesBox.innerHTML = config.content;
                    verifierScrollNecessaire();
                    showModal("Succès", "Configuration chargée.");
                } catch (err) { showModal("Erreur", "Fichier invalide.", true); }
            };
            reader.readAsText(file);
            input.value = "";
        }

        // --- EXPORT / IMPORT CONFIG ---
        function exportConfig() {
            const blob = new Blob([JSON.stringify({ content: rulesBox.innerHTML })], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "CONFIG_Reglement.json";
            a.click();
        }


        // --- CHARGEMENT DU JSON ---
        async function chargerReglement() {
            const rulesBox = document.getElementById('rulesBox');
            if (!rulesBox) return;

            try {
                const response = await fetch('reglement.json');
                if (!response.ok) throw new Error("Fichier reglement.json introuvable");

                const data = await response.json();
                let html = "";

                // Logo dynamique
                //if (data.logo) {
                //    html += `<div style="text-align:center; margin-bottom:20px;">
                //                <img src="${data.logo}" alt="Logo" style="max-width:200px; height:auto;">
                //             </div>`;
                //}

                // En-tête
                //html += `<h1 style="text-align:center; color:#0055A4; margin-bottom:5px;">${data.titre_general}</h1>`;
                //html += `<p style="text-align:center; font-weight:bold; margin-top:0; border:none;">${data.sous_titre}</p>`;
                //html += `<p style="text-align:center; font-size:0.9rem; margin-bottom:20px;">${data.preambule}</p>`;

             
                // --- Conteneur d'en-tête Responsive ---
                html += `<div style="display: flex; flex-direction: column; align-items: center; width: 100%; margin-bottom: 30px; box-sizing: border-box; padding: 10px;">`;

                // Logo dynamique
                // Logo dynamique (Adaptatif : Petit sur mobile, Max 150px sur PC)
                if (data.logo) {
                    html += `<div style="width: 100%; text-align: center; margin-bottom: 10px;">
                <img src="${data.logo}" alt="Logo" 
                     style="width: 25%; min-width: 80px; max-width: 150px; height: auto; object-fit: contain;">
                 </div>`;
                }

                // Titres et Préambule
                html += `
                <div style="width: 100%; text-align: center;">
                    <h1 style="color:#0055A4; margin: 0 0 5px 0; font-size: 1.3rem; line-height: 1.2;">
                        ${data.titre_general}
                    </h1>
                    <p style="font-weight: bold; margin: 0 0 8px 0; font-size: 1rem;">
                        ${data.sous_titre}
                    </p>
                   <div style="display: inline-block; background: #f1f5f9; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; color: #475569; margin-bottom: 15px; border: 1px solid #e2e8f0;">
                        ${data.code_document} • ${data.version}
                    </div>
                    <p style="font-size: 0.85rem; color: #475569; margin: 0; line-height: 1.4;">
                        ${data.preambule}
                    </p>
                </div>`;

                html += `</div>`;



                // Sections et Articles
                data.sections.forEach(section => {
                    html += `<h2 style="background:#2d3663; color:white; padding:12px; border-radius:4px; margin-top:40px; border:none;">
                                Section ${section.id} : ${section.titre}
                             </h2>`;

                    if (section.contenu_introductif) html += `<p><strong>${section.contenu_introductif}</strong></p>`;
                    if (section.objectifs) html += `<ul>${section.objectifs.map(o => `<li>${o}</li>`).join('')}</ul>`;
                    if (section.champ_application) html += `<p style="background:#f1f5f9; padding:10px; border-left:4px solid #38bdf8;">${section.champ_application}</p>`;

                    if (section.articles) {
                        section.articles.forEach(art => {
                            html += `<div style="margin-top:25px; border-bottom:1px solid #eee; padding-bottom:15px;">`;
                            html += `<h3 style="color:#0055A4;">Article ${art.num} : ${art.titre}</h3>`;
                            if (art.texte) html += `<p>${art.texte}</p>`;
                            if (art.points) html += `<ul>${art.points.map(p => `<li>${p}</li>`).join('')}</ul>`;

                            if (art.sanctions) {
                                html += `<div style="color:#b91c1c; font-weight:600; margin-top:10px;">🔴 Sanctions :</div>`;
                                html += `<ul>${art.sanctions.map(s => `<li>${s}</li>`).join('')}</ul>`;
                            }

                            if (art.cas_ouverture) {
                                html += `<strong>Cas autorisant l'ouverture :</strong>`;
                                html += `<ul>${art.cas_ouverture.map(c => `<li>${c}</li>`).join('')}</ul>`;
                            }

                            if (art.sous_articles) {
                                art.sous_articles.forEach(sub => {
                                    html += `<div style="margin-left:20px; border-left:2px solid #e2e8f0; padding-left:15px; margin-top:15px;">`;
                                    html += `<h4 style="color:#1e293b; margin-bottom:5px;">${sub.id} ${sub.titre}</h4>`;
                                    html += `<p>${sub.texte}</p>`;
                                    if (sub.points) html += `<ul>${sub.points.map(p => `<li>${p}</li>`).join('')}</ul>`;
                                    if (sub.extension_direction) {
                                        html += `<em>Extensions de la direction :</em>`;
                                        html += `<ul>${sub.extension_direction.map(e => `<li>${e}</li>`).join('')}</ul>`;
                                    }
                                    html += `</div>`;
                                });
                            }
                            html += `</div>`;
                        });
                    }
                });

                html += `<p style="text-align:center; margin-top:30px; color:#94a3b8;">*** Fin du document ***</p>`;
                rulesBox.innerHTML = html;

                // Une fois le contenu chargé, on vérifie si le scroll est nécessaire
                verifierScrollNecessaire();

            } catch (err) {
                console.error(err);
                rulesBox.innerHTML = `<div style="color:red; text-align:center; padding:50px;">Erreur critique : Impossible de charger reglement.json</div>`;
            }
        }

        // --- LOGIQUE DE SCROLL ---
        function verifierScrollNecessaire() {
            const rb = document.getElementById('rulesBox');
            if (!rb) return;
            setTimeout(() => {
                if (rb.scrollHeight <= rb.clientHeight + 20) {
                    document.getElementById('scrollInfo')?.classList.add('hidden');
                    document.getElementById('actionArea')?.classList.remove('hidden');
                }
            }, 800);
        }

        document.getElementById('rulesBox').onscroll = function () {
            if (this.scrollHeight - this.scrollTop <= this.clientHeight + 20) {
                document.getElementById('scrollInfo')?.classList.add('hidden');
                document.getElementById('actionArea')?.classList.remove('hidden');
            }
        };

        // --- SIGNATURE ET ÉMARGEMENT ---
        document.getElementById('checkAgree').onchange = function () {
            document.getElementById('btnSubmit').disabled = !this.checked;
        };

        document.getElementById('btnSubmit').onclick = function () {
            const dateStr = new Date().toLocaleString('fr-FR');
            completeSCORM(dateStr); // Envoi au LMS

            this.classList.add('hidden');
            document.getElementById('checkAgree').disabled = true;
            document.getElementById('timestamp').innerText = "Le " + dateStr;
            document.getElementById('msgSuccess').classList.remove('hidden');
            // showModal("Signé !", "Votre émargement a été enregistré avec succès.");
        };

        // --- POPUP MODAL ---
        function showModal(title, text, isError = false) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            const wrapper = document.querySelector('.modal-icon-wrapper');
            const icon = document.getElementById('modalIcon');
            if (isError) {
                wrapper.style.background = "#fee2e2"; wrapper.style.color = "#ef4444";
                icon.className = "fas fa-times";
            } else {
                wrapper.style.background = "#ecfdf5"; wrapper.style.color = "#10b981";
                icon.className = "fas fa-check";
            }
            document.getElementById('modalOverlay').classList.add('active');
        }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

        // --- SCORM 1.2 (LOGIQUE RUNTIME) ---
        function initSCORM() {
            var win = window;
            while ((win.API == null) && (win.parent != null) && (win.parent != win)) { win = win.parent; }
            api = win.API;
            if (api) {
                api.LMSInitialize("");
                api.LMSSetValue("cmi.core.lesson_status", "incomplete");
                api.LMSCommit("");
            }
        }

        function completeSCORM(timestampStr) {
            if (api) {
                api.LMSSetValue("cmi.core.lesson_status", "passed");
                api.LMSSetValue("cmi.core.score.raw", "100");
                api.LMSSetValue("cmi.comments", "Signé numériquement le : " + timestampStr);
                api.LMSCommit("");
                api.LMSFinish("");
            }
        }

        // --- GÉNÉRATION DU PACKAGE SCORM ZIP ---
        function generateSCORM() {

            // --- SÉCURITÉ : MOT DE PASSE ---
            const passwordAttendu = "Aftral1969"; // Change le mot de passe ici
            const motDePasseSaisi = prompt("Password pour générer le SCORM :");

            if (motDePasseSaisi === null) return; // L'utilisateur a cliqué sur annuler

            if (motDePasseSaisi !== passwordAttendu) {
                showModal("Accès refusé", "Mot de passe incorrect. Génération annulée.", true);
                return;
            }

            try {
                if (typeof JSZip === 'undefined') {
                    alert("JSZip n'est pas chargé. Vérifiez votre connexion.");
                    return;
                }
                const zip = new JSZip();
                const rulesContent = document.getElementById('rulesBox').innerHTML;

                // Clonage sécurisé pour l'export
                let docClone = document.documentElement.cloneNode(true);
                let bodyClone = docClone.querySelector('body') || docClone;

                // Fix du Logo en Base64 pour l'export
                try {
                    const logo = document.querySelector('header img') || document.querySelector('img');
                    if (logo && logo.naturalWidth > 0) {
                        const canvas = document.createElement('canvas');
                        canvas.width = logo.naturalWidth;
                        canvas.height = logo.naturalHeight;
                        canvas.getContext('2d').drawImage(logo, 0, 0);
                        const cloneImg = docClone.querySelector('header img') || docClone.querySelector('img');
                        if (cloneImg) cloneImg.src = canvas.toDataURL("image/png");
                    }
                } catch (e) { console.warn("Logo non exporté (CORS)"); }

                // --- Nettoyage et préparation du clone ---
                const target = docClone.querySelector('#rulesBox');
                if (target) {
                    target.innerHTML = rulesContent;
                    target.style.height = 'auto';
                    target.style.maxHeight = 'none';
                    target.style.overflow = 'visible';
                }

                  // 1. On affiche la zone d'action (puisque le scroll est considéré fait à l'export)
                const actionArea = docClone.querySelector('#actionArea');
                if (actionArea) actionArea.classList.remove('hidden');

                  // 2. On cache les infos de scroll qui ne servent plus
                const scrollInfo = docClone.querySelector('#scrollInfo');
                if (scrollInfo) scrollInfo.classList.add('hidden');

                  // 3. On force l'activation du bouton Valider et on lui donne la fonction SCORM
                const btnSubmit = docClone.querySelector('#btnSubmit');
                if (btnSubmit) {
                    btnSubmit.disabled = false; // On le rend cliquable
                    btnSubmit.classList.remove('hidden'); // On s'assure qu'il est visible
                    // On utilise setAttribute pour que le code JS soit écrit en dur dans le HTML du ZIP
                    btnSubmit.setAttribute('onclick', 'validerSignatureSCORM()');
                }

                  // 4. On cache le bouton de génération SCORM pour que l'utilisateur final ne le voie pas
                const btnGen = docClone.querySelector('button[onclick="generateSCORM()"]');
                if (btnGen) btnGen.style.display = 'none';



                // Injection du script de lecture SCORM pour le ZIP
                const scormScript = document.createElement('script');
                scormScript.textContent = `
                    var api = null;
                    function findAPI(win) {
                        while ((win.API == null) && (win.parent != null) && (win.parent != win)) { win = win.parent; }
                        return win.API;
                    }
                    window.onload = function() {
                        api = findAPI(window);
                        if (api) {
                            api.LMSInitialize("");
                            var status = api.LMSGetValue("cmi.core.lesson_status");
                            if(status === "passed" || status === "completed") {
                                document.getElementById('actionArea').style.display = 'none';
                                document.getElementById('msgSuccess').classList.remove('hidden');
                            }
                        }
                    };


                    function validerSignatureSCORM() {
                        let success = false;

                        if (api) {
                            // On tente d'envoyer les données
                            api.LMSSetValue("cmi.core.lesson_status", "passed");
                            api.LMSSetValue("cmi.core.score.raw", "100");
                            let commit = api.LMSCommit("");

                            // On vérifie si le LMS a bien accepté la donnée
                            if (commit === "true" || commit === true) {
                                success = true;
                                api.LMSFinish("");
                            }
                        }

                        if (success) {
                            // On n'affiche le message QUE si le SCORM a répondu "OK"
                            document.getElementById('msgSuccess').classList.remove('hidden');
                            document.getElementById('actionArea').style.display = 'none';
                        } else {
                            // Optionnel : Alerte si on n'est pas dans un LMS
                            alert("Erreur : Connexion au LMS impossible. La signature n'a pas été enregistrée.");
                        }
                       }

                `;

                bodyClone.appendChild(scormScript);

                // Manifest SCORM 1.2
                const manifest = `<?xml version="1.0" encoding="UTF-8"?>
<manifest identifier="RI_EXPORT" version="1.1" xmlns="http://www.imsproject.org/xsd/imscp_rootv1p1p2">
        <metadata><schema>ADL SCORM</schema><schemaversion>1.2</schemaversion></metadata>
        <organizations default="ORG-1"><organization identifier="ORG-1"><title>Reglement</title><item identifier="ITEM-1" identifierref="RES-1"><title>Document</title></item></organization></organizations>
        <resources><resource identifier="RES-1" type="webcontent" adlcp:scormtype="sco" href="index.html" xmlns:adlcp="http://www.adlnet.org/xsd/adlcp_rootv1p2"><file href="index.html"/></resource></resources>
</manifest>`;

                // Ajout au ZIP
                zip.file("imsmanifest.xml", manifest);
                zip.file("index.html", "<!DOCTYPE html>\n" + docClone.outerHTML.replace('<body', '<body class="scorm-mode"'));

                zip.generateAsync({ type: "blob" }).then(content => {
                    const a = document.createElement("a");
                    a.href = URL.createObjectURL(content);
                    a.download = "SCORM_Reglement_Final.zip";
                    a.click();
                });

            } catch (error) {
                console.error(error);
                alert("Erreur de génération du ZIP. Voir console.");
            }
        }
    </script>


</body>
</html>
