<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Règlement Intérieur - AFTRAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --nav-bg: #0f172a;
            --blue: #38bdf8;
            --text-nav: #f8fafc;
            --doc-bg: #ffffff;
            --doc-text: #1e293b;
            --doc-dim: #64748b;
            --doc-border: #e2e8f0;
            --page-bg: #f1f5f9;
            --aftral-blue: #2d3663;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--page-bg);
            color: var(--doc-text);
            min-height: 100vh;
        }

        /* --- NAVBAR HARMONISÉE --- */
        .navbar {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-back-link {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-brand-title {
            font-size: 1.1rem;
            margin: 0;
            color: white;
            border-left: 1px solid rgba(255,255,255,0.2);
            padding-left: 20px;
        }

        .nav-brand-subtitle {
            color: #38bdf8;
            font-weight: normal;
            margin-left: 10px;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .btn-nav {
            background: rgba(56, 189, 248, 0.05);
            color: var(--blue);
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: var(--transition);
        }

            .btn-nav:hover {
                background: var(--blue);
                color: #0f172a;
                transform: translateY(-1px);
            }

        .btn-save-load {
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- RESTE DU STYLE --- */
        .main-container {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .document-card {
            background: var(--doc-bg);
            max-width: 1000px;
            width: 100%;
            border-radius: 12px;
            padding: 30px 40px;
            border: 1px solid var(--doc-border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--page-bg);
            padding-bottom: 15px;
        }

        .logo-text {
            color: #0055A4;
            font-weight: 800;
            font-size: 1.8rem;
        }

        .content-scroll {
            background: #fafafa;
            height: 500px;
            overflow-y: auto;
            padding: 25px 35px;
            border-radius: 8px;
            border: 1px solid var(--doc-border);
            margin-bottom: 25px;
            line-height: 1.6;
            outline: none;
        }

            .content-scroll:focus {
                border-color: var(--blue);
                background: #ffffff;
            }

        h2 {
            color: #0055A4;
            font-size: 1.3rem;
            margin-top: 25px;
            border-bottom: none;
            padding-bottom: 5px;
        }

        .validation-area {
            text-align: center;
            padding: 25px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid var(--doc-border);
        }

        #scrollInfo {
            color: #0055A4;
            font-weight: 600;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        button#btnSubmit {
            background: var(--aftral-blue); /* bleu AFTRAL */
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

            button#btnSubmit:hover:not(:disabled) {
                background: #1e254a; /* bleu foncé au hover */
                transform: translateY(-2px);
            }

            button#btnSubmit:disabled {
                background: #cbd5e1; /* gris doux */
                color: #94a3b8;
                cursor: not-allowed;
            }

        .success-msg {
            color: #16a34a;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .hidden {
            display: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 24px;
            width: 350px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(-30px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

            .modal-overlay.active .modal-content {
                transform: translateY(0);
            }

        .modal-icon-wrapper {
            width: 70px;
            height: 70px;
            background: #ecfdf5;
            color: #10b981;
            font-size: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .modal-title {
            font-weight: 800;
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--aftral-blue);
        }

        .btn-modal {
            background: var(--aftral-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }

            .btn-modal:hover {
                background: #1e254a;
                transform: scale(1.02);
            }

        .scorm-mode .navbar {
            display: none !important;
        }

        .scorm-mode .document-card {
            border: none;
            box-shadow: none;
            /* On réduit légèrement le max-width pour laisser respirer sur grand écran */
            max-width: 70%;
            max-height: 90vh; /* Hauteur maximale pour éviter de dépasser l'écran */
            width: 100%;
            /* Centre la carte et ajoute 20px d'espace en haut/bas */
            margin: 20px auto;
            /* Espace interne pour que le texte ne colle pas aux bords */
            padding: 25px;
            box-sizing: border-box;
        }

        /* CASE À COCHER PERSONNALISÉE */
        .checkbox-container span {
            position: relative;
            padding-left: 30px;
        }

            /* Carré de la checkbox */
            .checkbox-container span::before {
                content: "";
                position: absolute;
                left: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
                height: 18px;
                border: 2px solid var(--aftral-blue);
                border-radius: 4px;
                background: white;
                transition: 0.2s;
            }

            /* Check (✔) */
            .checkbox-container span::after {
                content: "";
                position: absolute;
                left: 5px;
                top: 50%;
                transform: translateY(-50%) scale(0);
                width: 6px;
                height: 10px;
                border: solid white;
                border-width: 0 2px 2px 0;
                transform-origin: center;
                rotate: 45deg;
                transition: 0.2s;
            }

        /* État coché */
        .checkbox-container input[type="checkbox"]:checked + span::before {
            background-color: var(--aftral-blue);
            border-color: var(--aftral-blue);
        }

        .checkbox-container input[type="checkbox"]:checked + span::after {
            transform: translateY(-50%) scale(1) rotate(45deg);
        }

        .checkbox-container input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .checkbox-container {
            position: relative;
        }

        .checkbox-container:hover span::before {
             box-shadow: 0 0 0 3px rgba(45, 54, 99, 0.15);
        }

        .checkbox-container {
            cursor: pointer;
        }

    </style>
</head>
<body>

    <nav class="navbar" id="topNav">
        <div class="nav-left">
            <a href="../outils-hub.html" class="nav-back-link">
                <i class="fas fa-chevron-left"></i> Retour
            </a>
            <h1 class="nav-brand-title">
                IT PÉDAGOGIE <span class="nav-brand-subtitle">Règlement Intérieur</span>
            </h1>
        </div>

        <div class="nav-right">
            <button class="btn-nav btn-save-load" onclick="exportConfig()">
                <i class="fas fa-download"></i> Sauver Config
            </button>
            <button class="btn-nav btn-save-load" onclick="document.getElementById('importFile').click()">
                <i class="fas fa-upload"></i> Charger Config
            </button>
            <button class="btn-nav" onclick="generateSCORM()">
                <i class="fas fa-file-zipper"></i> Générer SCORM
            </button>
        </div>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importConfig(this)">
    </nav>

    <div class="main-container">
        <div class="document-card">
            <header style="position: relative; border-bottom: 2px solid #e2e8f0; padding: 20px; margin-bottom: 20px;">
               
                    <!-- LOGO À GAUCHE -->
                    <img src="logo.png" alt="Logo"
                         style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); height: 90px; object-fit: contain;">

                    <!-- TEXTE CENTRÉ -->
                    <div style="text-align: center;">
                        <div class="logo-text" style="font-size: 1.4rem; font-weight: 800; color: #2d3663; line-height: 1.3; margin-bottom: 10px; text-transform: uppercase;">
                            RÈGLEMENT INTÉRIEUR GÉNÉRAL DES APPRENANTS
                        </div>

                        <h2 style="color: #334155; margin: 5px 0; font-size: 1.1rem; font-weight: 600;">
                            Organisme de formation et Centre de Formation d'Apprentis (CFA)
                        </h2>

                        <small style="color: #94a3b8; display: block; margin-top: 10px;">
                            <!-- texte secondaire -->
                        </small>
                    </div>
                </header>
                <div class="content-scroll" id="rulesBox" contenteditable="true">
                    <p style="text-align:center; padding:20px; color:#64748b;">
                        <i class="fas fa-spinner fa-spin"></i> Chargement des articles...
                    </p>
                </div>

                <div class="validation-area">
                    <div id="scrollInfo">
                        <i class="fas fa-chevron-down"></i>
                        <span>Faites défiler jusqu'au bout pour pouvoir signer</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div id="actionArea" class="hidden">
                        <label class="checkbox-container">
                            <input type="checkbox" id="checkAgree">
                            <span style="color: #1e293b; font-size: 0.9rem;">Je certifie avoir pris connaissance du règlement intérieur.</span>
                        </label>
                        <button id="btnSubmit" disabled>Valider et Signer</button>
                    </div>
                    <div id="msgSuccess" class="hidden success-msg">
                        <i class="fas fa-check-circle"></i> Signature enregistrée avec succès.
                        <div id="timestamp" style="font-size: 0.8rem; font-weight: normal; margin-top: 5px; color: #64748b;"></div>
                    </div>
                </div>
</div>
    </div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-icon-wrapper"><i class="fas fa-check" id="modalIcon"></i></div>
            <div class="modal-title" id="modalTitle">Succès !</div>
            <div class="modal-text" id="modalText" style="color: #64748b; margin-bottom: 20px;">Opération réussie.</div>
            <button class="btn-modal" onclick="closeModal()">Continuer</button>
        </div>
    </div>


    <script>
        // --- VARIABLES GLOBALES ET ÉLÉMENTS ---
        var api = null;
        const rulesBox = document.getElementById('rulesBox');
        const scrollInfo = document.getElementById('scrollInfo');
        const actionArea = document.getElementById('actionArea');
        const btnSubmit = document.getElementById('btnSubmit');
        const checkAgree = document.getElementById('checkAgree');

        // --- CHARGEMENT DU JSON ---
        async function chargerReglement() {
            try {
                const response = await fetch('reglement.json');
                if (!response.ok) throw new Error("Fichier introuvable");

                const data = await response.json();
                let html = "";

                // Logo
                if (data.logo) {
                    html += `<div style="text-align:center; margin-bottom:20px;">
                                    <img src="${data.logo}" alt="Logo" style="max-width:200px; height:auto;">
                                 </div>`;
                }

                // En-tête
                html += `<h1 style="text-align:center; color:#0055A4; margin-bottom:5px;">${data.titre_general}</h1>`;
                html += `<p style="text-align:center; font-weight:bold; margin-top:0; border:none;">${data.sous_titre}</p>`;
                html += `<p style="text-align:center; font-size:0.9rem; margin-bottom:20px;">${data.preambule}</p>`;

                // Sections
                data.sections.forEach(section => {
                    html += `<h2 style="background:#2d3663; color:white; padding:12px; border-radius:4px; margin-top:40px; border:none;">
                                    Section ${section.id} : ${section.titre}
                                 </h2>`;

                    if (section.contenu_introductif) html += `<p><strong>${section.contenu_introductif}</strong></p>`;
                    if (section.objectifs) html += `<ul>${section.objectifs.map(o => `<li>${o}</li>`).join('')}</ul>`;
                    if (section.champ_application) html += `<p style="background:#f1f5f9; padding:10px; border-left:4px solid #38bdf8;">${section.champ_application}</p>`;

                    if (section.articles) {
                        section.articles.forEach(art => {
                            html += `<div style="margin-top:25px; border-bottom:1px solid #eee; padding-bottom:15px;">`;
                            html += `<h3 style="color:#0055A4;">Article ${art.num} : ${art.titre}</h3>`;
                            if (art.texte) html += `<p>${art.texte}</p>`;
                            if (art.points) html += `<ul>${art.points.map(p => `<li>${p}</li>`).join('')}</ul>`;
                            if (art.sanctions) {
                                html += `<div style="color:#b91c1c; font-weight:600; margin-top:10px;">🔴 Sanctions :</div>`;
                                html += `<ul>${art.sanctions.map(s => `<li>${s}</li>`).join('')}</ul>`;
                            }
                            if (art.cas_ouverture) {
                                html += `<strong>Cas autorisant l'ouverture :</strong>`;
                                html += `<ul>${art.cas_ouverture.map(c => `<li>${c}</li>`).join('')}</ul>`;
                            }
                            if (art.sous_articles) {
                                art.sous_articles.forEach(sub => {
                                    html += `<div style="margin-left:20px; border-left:2px solid #e2e8f0; padding-left:15px; margin-top:15px;">`;
                                    html += `<h4 style="color:#1e293b; margin-bottom:5px;">${sub.id} ${sub.titre}</h4>`;
                                    html += `<p>${sub.texte}</p>`;
                                    if (sub.points) html += `<ul>${sub.points.map(p => `<li>${p}</li>`).join('')}</ul>`;
                                    if (sub.extension_direction) {
                                        html += `<em>Extensions de la direction :</em>`;
                                        html += `<ul>${sub.extension_direction.map(e => `<li>${e}</li>`).join('')}</ul>`;
                                    }
                                    html += `</div>`;
                                });
                            }
                            html += `</div>`;
                        });
                    }
                });

                html += `<p style="text-align:center; margin-top:30px; color:#94a3b8;">*** Fin du document ***</p>`;
                rulesBox.innerHTML = html;

                verifierScrollNecessaire();

            } catch (err) {
                console.error(err);
                rulesBox.innerHTML = `<div style="color:red; text-align:center; padding:50px;">
                            <strong>Erreur critique :</strong> Impossible de lire le fichier JSON.<br>
                            Vérifiez qu'il est bien nommé <code>reglement.json</code>.
                        </div>`;
            }
        }

        // --- LOGIQUE DE SCROLL ET SIGNATURE ---
        function verifierScrollNecessaire() {
            setTimeout(() => {
                if (rulesBox.scrollHeight <= rulesBox.clientHeight + 15) {
                    scrollInfo.classList.add('hidden');
                    actionArea.classList.remove('hidden');
                }
            }, 600);
        }

        rulesBox.onscroll = function () {
            if (rulesBox.scrollHeight - rulesBox.scrollTop <= rulesBox.clientHeight + 15) {
                scrollInfo.classList.add('hidden');
                actionArea.classList.remove('hidden');
            }
        };

        checkAgree.onchange = function () {
            btnSubmit.disabled = !this.checked;
        };

        btnSubmit.onclick = function () {
            const now = new Date();
            const dateStr = now.toLocaleString('fr-FR');
            completeSCORM(dateStr);
            checkAgree.disabled = true;
            btnSubmit.classList.add('hidden');
            rulesBox.contentEditable = "false";
            document.getElementById('timestamp').innerText = "Le " + dateStr;
            document.getElementById('msgSuccess').classList.remove('hidden');
            showModal("Signé !", "Votre émargement est enregistré.");
        };

        // --- POPUP MODAL ---
        function showModal(title, text, isError = false) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            const iconWrapper = document.querySelector('.modal-icon-wrapper');
            if (isError) {
                iconWrapper.style.background = "#fee2e2"; iconWrapper.style.color = "#ef4444";
                document.getElementById('modalIcon').className = "fas fa-times";
            } else {
                iconWrapper.style.background = "#ecfdf5"; iconWrapper.style.color = "#10b981";
                document.getElementById('modalIcon').className = "fas fa-check";
            }
            document.getElementById('modalOverlay').classList.add('active');
        }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

        // --- SCORM 1.2 ---
        var api = null;

        function initSCORM() {
            var win = window;
            while ((win.API == null) && (win.parent != null) && (win.parent != win)) { win = win.parent; }
            api = win.API;

            if (api) {
                api.LMSInitialize("");
                // CRITIQUE : Dire au LMS qu'on a commencé mais pas fini
                api.LMSSetValue("cmi.core.lesson_status", "incomplete");
                api.LMSCommit("");
            }
        }

        function completeSCORM(timestampStr) {
            if (api) {
                // 1. On dit au LMS que c'est fini et réussi
                api.LMSSetValue("cmi.core.lesson_status", "passed");

                // 2. On valide le score (100/100) pour déclencher la complétion
                api.LMSSetValue("cmi.core.score.raw", "100");
                api.LMSSetValue("cmi.core.score.min", "0");
                api.LMSSetValue("cmi.core.score.max", "100");

                // 3. On ajoute le commentaire de signature
                api.LMSSetValue("cmi.comments", "Signé le : " + timestampStr);

                // 4. TRÈS IMPORTANT : On force l'enregistrement immédiat
                api.LMSCommit("");

                // 5. On ferme la session proprement
                api.LMSFinish("");
                console.log("Données SCORM transmises.");
            } else {
                console.error("API SCORM non trouvée.");
            }
        }

        // --- EXPORT / IMPORT CONFIG ---
        function exportConfig() {
            const blob = new Blob([JSON.stringify({ content: rulesBox.innerHTML })], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "CONFIG_Reglement.json";
            a.click();
        }

        function importConfig(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const config = JSON.parse(e.target.result);
                    rulesBox.innerHTML = config.content;
                    verifierScrollNecessaire();
                    showModal("Succès", "Configuration chargée.");
                } catch (err) { showModal("Erreur", "Fichier invalide.", true); }
            };
            reader.readAsText(file);
            input.value = "";
        }

        // --- GÉNÉRATION SCORM ZIP ---
        function generateSCORM() {
            try {
                if (typeof JSZip === 'undefined') {
                    showModal("Erreur", "La bibliothèque JSZip n'est pas chargée.", true);
                    return;
                }
                const zip = new JSZip();

                // 1. Capture du contenu et clonage
                const contenuFixe = document.getElementById('rulesBox').innerHTML;
                let docClone = document.documentElement.cloneNode(true);

                // 2. Gestion du LOGO (Base64) - Conservé
                const logoOriginal = document.querySelector('img[src*="logo"]');
                if (logoOriginal && logoOriginal.naturalWidth > 0) {
                    const canvas = document.createElement('canvas');
                    canvas.width = logoOriginal.naturalWidth;
                    canvas.height = logoOriginal.naturalHeight;
                    canvas.getContext('2d').drawImage(logoOriginal, 0, 0);
                    const logoClone = docClone.querySelector('img[src*="logo"]');
                    if (logoClone) logoClone.src = canvas.toDataURL("image/png");
                }

                // 3. Injection du contenu
                const targetBox = docClone.querySelector('#rulesBox');
                if (targetBox) {
                    targetBox.innerHTML = contenuFixe;
                    targetBox.setAttribute('contenteditable', 'false');
                    targetBox.style.userSelect = 'none';
                }

                // 4. Configuration de l'interface
                const clonedBtn = docClone.querySelector('#btnSubmit');
                const clonedCheck = docClone.querySelector('#checkAgree');
                const clonedAction = docClone.querySelector('#actionArea');
                const clonedInfo = docClone.querySelector('#scrollInfo');

                if (clonedAction) clonedAction.classList.add('hidden');
                if (clonedInfo) clonedInfo.classList.remove('hidden');

                if (clonedBtn) {
                    clonedBtn.disabled = true;
                    clonedBtn.setAttribute('onclick', "validerSignatureSCORM()");
                }
                if (clonedCheck) {
                    clonedCheck.checked = false;
                    clonedCheck.setAttribute('onchange', "document.getElementById('btnSubmit').disabled = !this.checked");
                }

                // 5. Script injecté (CORRIGÉ POUR SCROLL GLOBAL)
                const scriptText = `
            var api = null;
            function findAPI(win) {
                var findAttempts = 0;
                while ((win.API == null) && (win.parent != null) && (win.parent != win)) {
                    findAttempts++;
                    if (findAttempts > 500) return null;
                    win = win.parent;
                }
                return win.API;
            }

            window.onload = function() {
                api = findAPI(window);
                if (!api && window.opener) api = findAPI(window.opener);
                if (api) {
                    api.LMSInitialize("");
                    api.LMSSetValue("cmi.core.lesson_status", "incomplete");
                    api.LMSCommit("");
                }

                // DÉTECTION SUR LA PAGE ENTIÈRE
                window.onscroll = function() {
                    var docHeight = document.documentElement.scrollHeight;
                    var winHeight = window.innerHeight;
                    var scrollPos = window.pageYOffset || document.documentElement.scrollTop;

                    // Si on arrive en bas de la page (marge de 100px)
                    if ((scrollPos + winHeight) >= (docHeight - 100)) {
                        const info = document.getElementById('scrollInfo');
                        const area = document.getElementById('actionArea');
                        if(info) info.classList.add('hidden');
                        if(area) area.classList.remove('hidden');
                    }
                };
                
                // Sécurité : si le texte est très court
                setTimeout(function() {
                    if (document.documentElement.scrollHeight <= window.innerHeight) {
                        document.getElementById('scrollInfo').classList.add('hidden');
                        document.getElementById('actionArea').classList.remove('hidden');
                    }
                }, 1000);
            };

            function validerSignatureSCORM() {
                const now = new Date();
                const dateStr = now.toLocaleString('fr-FR');
                if (api) {
                    api.LMSSetValue("cmi.core.score.raw", "100");
                    api.LMSSetValue("cmi.core.lesson_status", "passed");
                    api.LMSSetValue("cmi.comments", "Signé le : " + dateStr);
                    api.LMSCommit("");
                    api.LMSFinish("");

                document.getElementById('btnSubmit').classList.add('hidden');
                document.getElementById('checkAgree').disabled = true;
                document.getElementById('timestamp').innerText = "Signé le " + dateStr;
                document.getElementById('msgSuccess').classList.remove('hidden');
                alert("Signature validée !");
            }
