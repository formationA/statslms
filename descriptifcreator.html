<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur AFTRAL - Personnalisé</title>
    <style>
        :root {
            --aftral-blue: #2d3663;
            --accent: #5c6eb1;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            background: #d1d5db;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            padding: 10px 20px;
            background: #2c3e50;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            z-index: 100;
        }

        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #editor {
            width: 380px;
            background: white;
            padding: 25px;
            border-right: 1px solid #94a3b8;
            overflow-y: auto;
        }

        h2 {
            color: var(--aftral-blue);
            font-size: 1rem;
            text-transform: uppercase;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 8px;
            margin-bottom: 20px;
        }

        .group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 700;
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input[type="color"] {
            height: 40px;
            padding: 2px;
            cursor: pointer;
        }

        textarea {
            height: 90px;
            resize: none;
        }

        .btn-export {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: var(--aftral-blue);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
        }

        #preview-zone {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            background: #e2e8f0;
        }

        #canvas {
            background: white;
            width: 100%;
            max-width: 900px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            height: fit-content;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" style="color: white; text-decoration: none; font-weight: bold; border: 1px solid white; padding: 5px 15px; border-radius: 5px; font-size: 0.8em;">
            ⬅️ Retour au Tableau de bord
        </a>
    </div>

    <div class="main-wrapper">
        <div id="editor">
            <h2>Configuration</h2>
            <div class="group">
                <label>Couleur des bandeaux</label>
                <input type="color" id="themeColor" value="#2d3663" oninput="render()">
            </div>
            
            <div class="group"><label>Titre de l'élément</label><input type="text" id="title" value="Gestion des temps de conduite" oninput="render()"></div>
            <div class="group"><label>Sous-titre (Contexte)</label><input type="text" id="subtitle" value="Réglementation Sociale Européenne" oninput="render()"></div>
            <div class="group"><label>Informations clés</label><input type="text" id="meta" value="Durée estimée : 2h | Niveau : Avancé" oninput="render()"></div>
            <div class="group"><label>Description</label><textarea id="desc" oninput="render()">Ce contenu permet d'approfondir les règles liées au temps de travail, aux pauses et au repos quotidien/hebdomadaire des conducteurs...</textarea></div>
            <div class="group"><label>Points clés (1 par ligne)</label><textarea id="objs" oninput="render()">Le disque et la carte tachygraphe&#10;Calcul des amplitudes&#10;Gestion des dépassements exceptionnels</textarea></div>
            <div class="group"><label>Référence Documentaire</label><input type="text" id="ref" value="REF-AFTRAL-2026-X4" oninput="render()"></div>
            <button class="btn-export" onclick="download()">📥 Télécharger l'HTML</button>
        </div>

        <div id="preview-zone">
            <div id="canvas"></div>
        </div>
    </div>

    <script>
        // Fonction pour éclaircir une couleur (pour le dégradé)
        function lightenColor(col, amt) {
            col = col.replace(/^#/, '');
            var num = parseInt(col, 16);
            var r = (num >> 16) + amt;
            if (r > 255) r = 255; else if (r < 0) r = 0;
            var b = ((num >> 8) & 0x00FF) + amt;
            if (b > 255) b = 255; else if (b < 0) b = 0;
            var g = (num & 0x0000FF) + amt;
            if (g > 255) g = 255; else if (g < 0) g = 0;
            return "#" + (g | (b << 8) | (r << 16)).toString(16).padStart(6, '0');
        }

        function render() {
            const themeColor = document.getElementById('themeColor').value;
            const lightColor = lightenColor(themeColor, 30);
            const title = document.getElementById('title').value;
            const subtitle = document.getElementById('subtitle').value;
            const meta = document.getElementById('meta').value;
            const desc = document.getElementById('desc').value;
            const ref = document.getElementById('ref').value;
            const objsRaw = document.getElementById('objs').value;
            const objs = objsRaw.split('\n').filter(t => t.trim() !== "");

            const metaHtml = meta.trim() !== "" ? `
                    <div style="padding: 0 50px; margin-top: -22px; position: relative; z-index: 5;">
                        <div style="background: #f1f5f9; border: 1px solid #cbd5e1; display: inline-block; padding: 10px 20px; border-radius: 8px; font-weight: 700; font-size: 0.85rem; color: ${themeColor}; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                            ${meta}
                        </div>
                    </div>` : "";

            let pointsClesHtml = "";
            if (objs.length > 0) {
                const listHtml = objs.map(o => `
                        <div style="display:flex; align-items:flex-start; margin-bottom:8px; color:#334155;">
                            <span style="color:${themeColor}; margin-right:12px; font-weight:bold;">•</span>
                            <span style="font-size:1.05rem;">${o}</span>
                        </div>`).join('');

                pointsClesHtml = `
                        <div style="background: #f8fafc; padding: 20px 25px; border-radius: 10px; border: 1px solid #f1f5f9; margin-top: 15px;">
                            <h3 style="color: ${themeColor}; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px;">Points clés</h3>
                            <div style="display: grid; grid-template-columns: 1fr;">${listHtml}</div>
                        </div>`;
            }

            const content = `
                    <div style="font-family: 'Segoe UI', Helvetica, Arial, sans-serif; color: #1e293b; background: white; margin: 0 auto; max-width: 900px; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden;">
                        <div style="background: linear-gradient(90deg, ${lightColor} 0%, ${themeColor} 100%); color: white; padding: 35px 50px 45px 50px;">
                            <div style="text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; opacity: 0.8; margin-bottom: 8px; font-weight: 500;">${subtitle}</div>
                            <h1 style="margin: 0; font-size: 2rem; font-weight: 800; line-height: 1.1;">${title}</h1>
                        </div>
                        ${metaHtml}
                        <div style="padding: ${meta.trim() !== "" ? '30px' : '40px'} 50px 40px 50px;">
                            <div>
                                <h3 style="color: ${themeColor}; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 2px solid ${themeColor}; display: inline-block; padding-bottom: 3px; margin-bottom: 15px;">Description</h3>
                                <p style="font-size: 1.1rem; line-height: 1.6; color: #475569; text-align: justify; margin: 0;">${desc.replace(/\n/g, '<br>')}</p>
                            </div>
                            ${pointsClesHtml}
                        </div>
                        <div style="background: ${themeColor}; color: white; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem;">
                            <span style="font-weight: 600; opacity: 0.9;">AFTRAL | DPSO</span>
                            <span style="background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 4px; font-family: monospace;">${ref}</span>
                        </div>
                    </div>`;

            document.getElementById('canvas').innerHTML = content;
        }

        function download() {
            const content = document.getElementById('canvas').innerHTML;
            const refName = document.getElementById('ref').value.trim() || 'Fiche_AFTRAL';
            const fileName = refName.replace(/[/\\?%*:|"<>]/g, '-');
            const blob = new Blob([`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"></head><body style="margin:40px; background:#f0f2f5; display:flex; justify-content:center;">${content}</body></html>`], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${fileName}.html`;
            a.click();
        }

        render();
    </script>
</body>
</html>
